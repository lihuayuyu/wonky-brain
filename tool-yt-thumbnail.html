<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube 縮圖下載・封面圖一鍵抓</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kaisei+Decol:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF5FA; --ink: #4A3A5C; --ink-soft: #8B7BA0;
    --pink: #FF8FAF; --pink-soft: #FFC8DD; --pink-deep: #E8538A;
    --blue: #A8C8FF; --blue-soft: #D4E2FF; --blue-deep: #6B9DFF;
    --yellow: #FFE9A8; --yellow-soft: #FFF5D1;
    --green: #B8E5C8; --green-deep: #6BC48F;
    --purple: #D4C0FF; --purple-deep: #B294E0;
    --grid-line: rgba(232, 83, 138, 0.18); --line: rgba(74, 58, 92, 0.15);
    --shadow: 3px 3px 0 var(--ink); --shadow-sm: 2px 2px 0 var(--ink);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { color: var(--ink); font-family: 'Noto Sans TC', sans-serif; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  body { background: linear-gradient(135deg, #FFE4F0 0%, #FFD6EA 50%, #F5DCFF 100%); min-height: 100vh; position: relative; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255, 150, 195, 0.5) 0%, transparent 35%),
      radial-gradient(circle at 80% 15%, rgba(220, 200, 255, 0.45) 0%, transparent 40%),
      radial-gradient(circle at 50% 60%, rgba(255, 195, 220, 0.5) 0%, transparent 45%),
      radial-gradient(circle at 90% 75%, rgba(230, 200, 255, 0.45) 0%, transparent 35%),
      radial-gradient(circle at 10% 85%, rgba(255, 180, 210, 0.5) 0%, transparent 40%);
    pointer-events: none; z-index: 0; filter: blur(2px);
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 35px 35px; pointer-events: none; z-index: 1; mix-blend-mode: multiply;
  }
  header, main, .toast { position: relative; z-index: 2; }
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255, 228, 240, 0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--ink); padding: 16px 32px 14px;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900; font-size: 28px; letter-spacing: 0.04em; line-height: 1; color: var(--ink); transform: rotate(-2deg); position: relative; }
  .brand h1::after { content: '📺'; position: absolute; top: -10px; right: -28px; font-size: 15px; transform: rotate(15deg); }
  .brand .sub { font-family: 'Caveat', cursive; font-size: 18px; color: var(--pink-deep); font-weight: 600; transform: rotate(-1deg); }
  .donate-btn { display: flex; align-items: center; height: 40px; padding: 6px 14px; border-radius: 12px; color: #F8E0BE; background-color: #AD5138; border: 2px solid var(--ink); text-decoration: none; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 600; box-shadow: var(--shadow-sm); transition: all 0.2s; gap: 8px; white-space: nowrap; }
  .donate-btn:hover { transform: translate(-1px, -1px); box-shadow: var(--shadow); background-color: #C25E45; }
  .donate-icon { width: 26px; height: 26px; flex-shrink: 0; display: block; }

  main { max-width: 820px; margin: 0 auto; padding: 32px 24px 60px; display: flex; flex-direction: column; gap: 22px; }

  .input-card { background: white; border: 2px solid var(--ink); border-radius: 18px; padding: 22px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 14px; }
  .input-label { font-family: 'Kaisei Decol', serif; font-size: 16px; font-weight: 700; }
  .url-row { display: flex; gap: 10px; }
  .url-input { flex: 1; padding: 12px 16px; border: 2px solid var(--ink); border-radius: 12px; background: var(--yellow-soft); font-family: 'DM Mono', monospace; font-size: 14px; color: var(--ink); min-width: 0; }
  .url-input:focus { outline: none; background: white; box-shadow: var(--shadow-sm); }

  .btn { font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 14px; padding: 11px 20px; background: white; border: 2px solid var(--ink); color: var(--ink); cursor: pointer; transition: all 0.2s; border-radius: 999px; box-shadow: var(--shadow-sm); white-space: nowrap; }
  .btn:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: var(--shadow); background: var(--pink-soft); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--pink-deep); color: white; }
  .btn.primary:hover:not(:disabled) { background: var(--pink); }
  .btn.sm { padding: 7px 14px; font-size: 12px; }

  .hint { font-size: 12px; color: var(--ink-soft); font-family: 'DM Mono', monospace; }

  .results { display: flex; flex-direction: column; gap: 14px; }
  .thumb-card { background: white; border: 2px solid var(--ink); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
  .thumb-card-header { padding: 10px 16px; border-bottom: 2px solid var(--ink); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; background: var(--yellow-soft); }
  .thumb-card-title { font-family: 'Kaisei Decol', serif; font-weight: 700; font-size: 15px; }
  .thumb-card-res { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink-soft); }
  .thumb-img-wrap { background: repeating-conic-gradient(#FFE4F0 0% 25%, #FFFFFF 0% 50%) 50% / 16px 16px; display: flex; justify-content: center; padding: 12px; }
  .thumb-img { max-width: 100%; height: auto; border: 1.5px solid var(--line); border-radius: 8px; display: block; }
  .thumb-actions { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; }

  .empty { text-align: center; color: var(--ink-soft); font-style: italic; padding: 30px; }

  .info-note { background: var(--yellow-soft); border: 2px solid var(--ink); padding: 14px 16px; font-size: 13px; line-height: 1.7; color: var(--ink); border-radius: 12px; box-shadow: var(--shadow-sm); }
  .info-note b { color: var(--pink-deep); font-weight: 700; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: white; padding: 12px 22px; font-size: 14px; border: 2px solid var(--ink); box-shadow: 4px 4px 0 var(--pink-deep); opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 1000; border-radius: 999px; font-weight: 500; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { box-shadow: 4px 4px 0 var(--pink); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>YT 縮圖下載</h1>
    <div class="sub">歪腦袋小工具 · v1.0</div>
  </div>
  <a class="donate-btn" href="https://fernfern.bobaboba.me" target="_blank" rel="noopener">
    <svg class="donate-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 7 L7.5 21 Q7.7 22.2 9 22.2 L15 22.2 Q16.3 22.2 16.5 21 L19 7 Z" fill="#F8E0BE" stroke="#3A2618" stroke-width="1.3" stroke-linejoin="round"/>
      <ellipse cx="12" cy="7" rx="7" ry="1.6" fill="#C48A60" stroke="#3A2618" stroke-width="1.3"/>
      <path d="M14 2 L13 8" stroke="#E85A5A" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="10" cy="17" r="1.3" fill="#3A2618"/>
      <circle cx="13" cy="18.5" r="1.3" fill="#3A2618"/>
      <circle cx="11" cy="14" r="1.2" fill="#3A2618"/>
      <circle cx="14" cy="15.5" r="1.2" fill="#3A2618"/>
    </svg>
    <div>歡迎餵食我 🤤</div>
  </a>
</header>

<main>
  <div class="input-card">
    <div class="input-label">貼上 YouTube 影片網址</div>
    <div class="url-row">
      <input class="url-input" id="urlInput" placeholder="https://www.youtube.com/watch?v=...　或　https://youtu.be/...">
      <button class="btn primary" id="btnGet">抓縮圖</button>
    </div>
    <div class="hint">💡 支援 watch?v=、youtu.be/、shorts/、embed/ 等各種網址格式</div>
  </div>

  <div class="results" id="results">
    <div class="empty">貼上網址後，會列出各種解析度的縮圖讓你下載</div>
  </div>

  <div class="info-note">
    📌 <b>用途：</b>下載自己影片的封面備份、研究別人封面的設計參考。<br>
    ⚠️ <b>提醒：</b>縮圖是別人的創作，僅供參考學習，<b>請勿直接拿來商用或盜用</b>。
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
function toast(msg, err = false) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 2200);
}

// ─── 解析 YouTube 影片 ID ───
function extractVideoId(url) {
  url = url.trim();
  // 各種格式
  const patterns = [
    /(?:youtube\.com\/watch\?(?:.*&)?v=)([a-zA-Z0-9_-]{11})/,
    /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/live\/)([a-zA-Z0-9_-]{11})/,
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  // 純 ID（11 碼）
  if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
  return null;
}

// YouTube 縮圖各種解析度
const thumbTypes = [
  { key: 'maxresdefault', label: '最高畫質', res: '1280×720' },
  { key: 'sddefault', label: '標準畫質', res: '640×480' },
  { key: 'hqdefault', label: '高畫質', res: '480×360' },
  { key: 'mqdefault', label: '中畫質', res: '320×180' },
  { key: 'default', label: '預設', res: '120×90' },
];

function getThumbs() {
  const url = $('urlInput').value;
  const vid = extractVideoId(url);
  if (!vid) {
    toast('無法辨識影片網址，請確認格式', true);
    return;
  }

  const results = $('results');
  results.innerHTML = '';

  thumbTypes.forEach(type => {
    const imgUrl = `https://img.youtube.com/vi/${vid}/${type.key}.jpg`;
    const card = document.createElement('div');
    card.className = 'thumb-card';
    card.innerHTML = `
      <div class="thumb-card-header">
        <span class="thumb-card-title">${type.label}</span>
        <span class="thumb-card-res">${type.res}</span>
      </div>
      <div class="thumb-img-wrap">
        <img class="thumb-img" src="${imgUrl}" alt="${type.label}" loading="lazy">
      </div>
      <div class="thumb-actions">
        <button class="btn primary sm" data-download="${imgUrl}" data-name="yt-${vid}-${type.key}.jpg">⬇ 下載</button>
        <button class="btn sm" data-copyurl="${imgUrl}">📋 複製網址</button>
        <a class="btn sm" href="${imgUrl}" target="_blank" rel="noopener">🔗 開新分頁</a>
      </div>
    `;
    // maxres 有時候不存在，圖片載入失敗就隱藏整張卡
    const img = card.querySelector('img');
    img.addEventListener('error', () => {
      // YouTube 對不存在的縮圖會回傳 120x90 的灰底佔位圖
      if (img.naturalWidth === 120 && type.key === 'maxresdefault') {
        card.style.display = 'none';
      }
    });
    results.appendChild(card);
  });

  // 綁定下載 / 複製
  results.querySelectorAll('[data-download]').forEach(btn => {
    btn.addEventListener('click', () => downloadImage(btn.dataset.download, btn.dataset.name));
  });
  results.querySelectorAll('[data-copyurl]').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(btn.dataset.copyurl).then(() => toast('✓ 已複製圖片網址')).catch(() => {});
    });
  });

  toast('✓ 已找到縮圖');
}

// ─── 下載圖片（透過 fetch + blob，避免跳轉） ───
async function downloadImage(url, filename) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(blobUrl);
    toast('已下載 ' + filename);
  } catch (e) {
    // 跨域可能擋下載，退而求其次：開新分頁讓使用者右鍵存檔
    window.open(url, '_blank');
    toast('已開新分頁，請右鍵另存圖片', true);
  }
}

$('btnGet').addEventListener('click', getThumbs);
$('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') getThumbs();
});

// 貼上自動觸發
$('urlInput').addEventListener('paste', () => {
  setTimeout(getThumbs, 100);
});
</script>
</body>
</html>
