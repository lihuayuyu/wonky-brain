<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密碼產生器・強密碼一鍵生成</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kaisei+Decol:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF5FA;
    --ink: #4A3A5C;
    --ink-soft: #8B7BA0;
    --pink: #FF8FAF;
    --pink-soft: #FFC8DD;
    --pink-deep: #E8538A;
    --blue: #A8C8FF;
    --blue-soft: #D4E2FF;
    --blue-deep: #6B9DFF;
    --yellow: #FFE9A8;
    --yellow-soft: #FFF5D1;
    --green: #B8E5C8;
    --green-deep: #6BC48F;
    --purple: #D4C0FF;
    --purple-deep: #B294E0;
    --grid-line: rgba(232, 83, 138, 0.18);
    --line: rgba(74, 58, 92, 0.15);
    --shadow: 3px 3px 0 var(--ink);
    --shadow-sm: 2px 2px 0 var(--ink);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background: linear-gradient(135deg, #FFE4F0 0%, #FFD6EA 50%, #F5DCFF 100%);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255, 150, 195, 0.5) 0%, transparent 35%),
      radial-gradient(circle at 80% 15%, rgba(220, 200, 255, 0.45) 0%, transparent 40%),
      radial-gradient(circle at 50% 60%, rgba(255, 195, 220, 0.5) 0%, transparent 45%),
      radial-gradient(circle at 90% 75%, rgba(230, 200, 255, 0.45) 0%, transparent 35%),
      radial-gradient(circle at 10% 85%, rgba(255, 180, 210, 0.5) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
    filter: blur(2px);
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 35px 35px;
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: multiply;
  }
  header, main, .toast { position: relative; z-index: 2; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255, 228, 240, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--ink);
    padding: 16px 32px 14px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--ink);
    transform: rotate(-2deg);
    position: relative;
  }
  .brand h1::after {
    content: '🔑';
    position: absolute;
    top: -10px;
    right: -24px;
    font-size: 15px;
    transform: rotate(15deg);
  }
  .brand .sub {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--pink-deep);
    font-weight: 600;
    transform: rotate(-1deg);
  }
  .donate-btn {
    display: flex;
    align-items: center;
    height: 40px;
    padding: 6px 14px;
    border-radius: 12px;
    color: #F8E0BE;
    background-color: #AD5138;
    border: 2px solid var(--ink);
    text-decoration: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 600;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s;
    gap: 8px;
    white-space: nowrap;
  }
  .donate-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: var(--shadow);
    background-color: #C25E45;
  }
  .donate-icon { width: 26px; height: 26px; flex-shrink: 0; display: block; }

  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  /* 密碼顯示框 */
  .password-display {
    background: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
  }
  .password-text {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: white;
    word-break: break-all;
    line-height: 1.3;
    min-height: 1.3em;
  }
  .password-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 44px; height: 44px;
    border: 2px solid white;
    background: transparent;
    color: white;
    border-radius: 12px;
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    transition: all 0.2s;
  }
  .icon-btn:hover { background: white; color: var(--ink); transform: translate(-1px, -1px); }

  /* 強度條 */
  .strength-bar-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .strength-bar {
    height: 12px;
    background: var(--yellow-soft);
    border: 2px solid var(--ink);
    border-radius: 999px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    transition: width 0.3s, background 0.3s;
    border-radius: 999px;
  }
  .strength-label {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .strength-label b { font-family: 'Zen Maru Gothic', sans-serif; }

  /* 設定卡 */
  .settings-card {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .setting-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .setting-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .setting-header label {
    font-family: 'Kaisei Decol', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
  }
  .length-value {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--pink-deep);
    background: var(--pink-soft);
    border: 2px solid var(--ink);
    border-radius: 999px;
    padding: 2px 16px;
  }
  input[type=range] {
    width: 100%;
    height: 8px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--yellow-soft);
    border: 2px solid var(--ink);
    border-radius: 999px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px; height: 24px;
    background: var(--pink-deep);
    border: 2px solid var(--ink);
    border-radius: 50%;
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 24px; height: 24px;
    background: var(--pink-deep);
    border: 2px solid var(--ink);
    border-radius: 50%;
    cursor: pointer;
  }

  .option-toggles {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    padding: 10px 14px;
    border: 2px solid var(--ink);
    border-radius: 12px;
    background: white;
    transition: all 0.15s;
  }
  .toggle-row:hover { background: var(--yellow-soft); }
  .toggle-row.active { background: var(--pink-soft); }
  .toggle-row input { display: none; }
  .toggle-check {
    width: 24px; height: 24px;
    border: 2px solid var(--ink);
    border-radius: 6px;
    background: white;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: transparent;
  }
  .toggle-row.active .toggle-check {
    background: var(--pink-deep);
    color: white;
  }
  .toggle-label {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
  }
  .toggle-sample {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
  }

  .generate-btn {
    font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 20px;
    padding: 16px;
    background: var(--pink-deep);
    color: white;
    border: 3px solid var(--ink);
    cursor: pointer;
    border-radius: 999px;
    box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.15s;
    letter-spacing: 0.06em;
    width: 100%;
  }
  .generate-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
    background: var(--pink);
  }
  .generate-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .info-note {
    background: var(--yellow-soft);
    border: 2px solid var(--ink);
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--ink);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
  }
  .info-note b { color: var(--pink-deep); font-weight: 700; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 12px 22px;
    font-size: 14px;
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 var(--pink-deep);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 1000;
    border-radius: 999px;
    font-weight: 500;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>密碼產生器</h1>
    <div class="sub">歪腦袋小工具 · v1.0</div>
  </div>
  <a class="donate-btn" href="https://fernfern.bobaboba.me" target="_blank" rel="noopener">
    <svg class="donate-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 7 L7.5 21 Q7.7 22.2 9 22.2 L15 22.2 Q16.3 22.2 16.5 21 L19 7 Z" fill="#F8E0BE" stroke="#3A2618" stroke-width="1.3" stroke-linejoin="round"/>
      <ellipse cx="12" cy="7" rx="7" ry="1.6" fill="#C48A60" stroke="#3A2618" stroke-width="1.3"/>
      <path d="M14 2 L13 8" stroke="#E85A5A" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="10" cy="17" r="1.3" fill="#3A2618"/>
      <circle cx="13" cy="18.5" r="1.3" fill="#3A2618"/>
      <circle cx="11" cy="14" r="1.2" fill="#3A2618"/>
      <circle cx="14" cy="15.5" r="1.2" fill="#3A2618"/>
    </svg>
    <div>歡迎餵食我 🤤</div>
  </a>
</header>

<main>
  <div class="password-display">
    <div class="password-text" id="passwordText">點擊產生密碼</div>
    <div class="password-actions">
      <button class="icon-btn" id="btnRefresh" title="重新產生">↻</button>
      <button class="icon-btn" id="btnCopy" title="複製">📋</button>
    </div>
  </div>

  <div class="strength-bar-wrap">
    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill" style="width:0%"></div>
    </div>
    <div class="strength-label">
      <span>強度</span>
      <b id="strengthText">—</b>
    </div>
  </div>

  <div class="settings-card">
    <div class="setting-row">
      <div class="setting-header">
        <label>密碼長度</label>
        <span class="length-value" id="lengthValue">16</span>
      </div>
      <input type="range" id="lengthSlider" min="4" max="64" value="16">
    </div>

    <div class="option-toggles">
      <label class="toggle-row active" data-opt="lower">
        <input type="checkbox" checked>
        <span class="toggle-check">✓</span>
        <span class="toggle-label">小寫字母</span>
        <span class="toggle-sample">abcdefg</span>
      </label>
      <label class="toggle-row active" data-opt="upper">
        <input type="checkbox" checked>
        <span class="toggle-check">✓</span>
        <span class="toggle-label">大寫字母</span>
        <span class="toggle-sample">ABCDEFG</span>
      </label>
      <label class="toggle-row active" data-opt="number">
        <input type="checkbox" checked>
        <span class="toggle-check">✓</span>
        <span class="toggle-label">數字</span>
        <span class="toggle-sample">0123456</span>
      </label>
      <label class="toggle-row active" data-opt="symbol">
        <input type="checkbox" checked>
        <span class="toggle-check">✓</span>
        <span class="toggle-label">特殊符號</span>
        <span class="toggle-sample">!@#$%^&</span>
      </label>
      <label class="toggle-row" data-opt="noAmbiguous">
        <input type="checkbox">
        <span class="toggle-check">✓</span>
        <span class="toggle-label">排除易混淆字元</span>
        <span class="toggle-sample">0O1lI</span>
      </label>
    </div>

    <button class="generate-btn" id="btnGenerate">🔑 產生密碼</button>
  </div>

  <div class="info-note">
    🔒 <b>安全說明：</b>密碼完全在你的瀏覽器產生（使用 <b>crypto 加密級亂數</b>），不會傳到任何伺服器，關掉網頁就消失。<br>
    💡 建議：重要帳號用 <b>16 字以上</b> 並開啟全部字元類型。
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 2000);
}

const charsets = {
  lower: 'abcdefghijklmnopqrstuvwxyz',
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  number: '0123456789',
  symbol: '!@#$%^&*()_+-=[]{}|;:,.<>?',
};
const ambiguous = '0O1lI|`';

const state = {
  length: 16,
  options: { lower: true, upper: true, number: true, symbol: true, noAmbiguous: false },
};

// ─── 加密級亂數 ───
function secureRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function generatePassword() {
  let pool = '';
  if (state.options.lower) pool += charsets.lower;
  if (state.options.upper) pool += charsets.upper;
  if (state.options.number) pool += charsets.number;
  if (state.options.symbol) pool += charsets.symbol;

  if (!pool) {
    toast('至少要選一種字元類型');
    return;
  }

  if (state.options.noAmbiguous) {
    pool = pool.split('').filter(c => !ambiguous.includes(c)).join('');
  }

  let pw = '';
  for (let i = 0; i < state.length; i++) {
    pw += pool[secureRandom(pool.length)];
  }

  $('passwordText').textContent = pw;
  updateStrength(pw, pool.length);
}

function updateStrength(pw, poolSize) {
  // 熵 = length * log2(poolSize)
  const entropy = pw.length * Math.log2(poolSize);
  let level, color, pct;
  if (entropy < 40) {
    level = '弱'; color = 'linear-gradient(90deg, var(--pink), var(--pink-deep))'; pct = 25;
  } else if (entropy < 60) {
    level = '中等'; color = 'linear-gradient(90deg, var(--yellow), #FFB833)'; pct = 50;
  } else if (entropy < 80) {
    level = '強'; color = 'linear-gradient(90deg, var(--green), var(--green-deep))'; pct = 75;
  } else {
    level = '非常強'; color = 'linear-gradient(90deg, var(--green-deep), #3FAD6F)'; pct = 100;
  }
  $('strengthFill').style.width = pct + '%';
  $('strengthFill').style.background = color;
  $('strengthText').textContent = `${level}（熵 ${Math.round(entropy)} bits）`;
}

// ─── 事件 ───
$('lengthSlider').addEventListener('input', e => {
  state.length = parseInt(e.target.value);
  $('lengthValue').textContent = state.length;
  generatePassword();
});

document.querySelectorAll('.toggle-row').forEach(row => {
  row.addEventListener('click', e => {
    e.preventDefault();
    const opt = row.dataset.opt;
    state.options[opt] = !state.options[opt];
    row.classList.toggle('active', state.options[opt]);
    generatePassword();
  });
});

$('btnGenerate').addEventListener('click', generatePassword);
$('btnRefresh').addEventListener('click', generatePassword);

$('btnCopy').addEventListener('click', async () => {
  const pw = $('passwordText').textContent;
  if (!pw || pw === '點擊產生密碼') return;
  try {
    await navigator.clipboard.writeText(pw);
    toast('✓ 已複製密碼');
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = pw;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✓ 已複製密碼');
  }
});

// 初始產生
generatePassword();
</script>
</body>
</html>
