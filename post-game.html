<style>
:root {
  --bg: #FFE4F0;
  --bg-paper: #FFFFFF;
  --ink: #4A3A5C;
  --ink-soft: #8B7BA0;
  --pink: #FF8FAF;
  --pink-soft: #FFC8DD;
  --pink-deep: #E8538A;
  --blue: #A8C8FF;
  --blue-soft: #B0D4FF;
  --yellow: #FFE9A8;
  --green: #B8E5C8;
  --purple: #D4C0FF;
  --grid-line: rgba(232, 83, 138, 0.18);
  --purple-deep: #B294E0;
  --line: rgba(42, 58, 107, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: linear-gradient(135deg, #FFE4F0 0%, #FFD6EA 50%, #F5DCFF 100%);
  color: var(--ink);
  font-family: 'Kaisei Decol', 'Noto Sans TC', serif;
  overflow-x: hidden;
  position: relative;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(255, 150, 195, 0.7) 0%, transparent 35%),
    radial-gradient(circle at 80% 15%, rgba(220, 200, 255, 0.65) 0%, transparent 40%),
    radial-gradient(circle at 50% 60%, rgba(255, 195, 220, 0.7) 0%, transparent 45%),
    radial-gradient(circle at 90% 75%, rgba(230, 200, 255, 0.65) 0%, transparent 35%),
    radial-gradient(circle at 10% 85%, rgba(255, 180, 210, 0.7) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
  filter: blur(2px);
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    radial-gradient(circle at 15% 15%, rgba(255, 105, 180, 0.15) 0%, transparent 35%),
    radial-gradient(circle at 85% 50%, rgba(74, 158, 255, 0.18) 0%, transparent 40%);
  pointer-events: none;
  z-index: 1;
}

.page-stickers { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
.sticker { position: absolute; user-select: none; animation: floatSticker 6s ease-in-out infinite; }
.sticker.flower { font-size: 1.8rem; color: var(--pink); filter: drop-shadow(1px 1px 0 rgba(74, 58, 92, 0.3)); }
.sticker.heart { font-size: 1.6rem; color: var(--pink-deep); filter: drop-shadow(1px 1px 0 rgba(74, 58, 92, 0.3)); }
.sticker.star { font-size: 1.5rem; color: var(--purple-deep); filter: drop-shadow(1px 1px 0 rgba(74, 58, 92, 0.3)); }
.sticker.sparkle { font-size: 1.4rem; color: var(--blue-deep); filter: drop-shadow(1px 1px 0 rgba(74, 58, 92, 0.3)); }
.sticker.tape { width: 60px; height: 22px; background: rgba(196, 157, 255, 0.7); border-left: 2px dashed rgba(0,0,0,0.2); border-right: 2px dashed rgba(0,0,0,0.2); }
.sticker.s1 { top: 8%; left: 4%; animation-delay: 0s; }
.sticker.s2 { top: 18%; right: 6%; animation-delay: 1.2s; transform: rotate(15deg); }
.sticker.s3 { top: 35%; left: 3%; animation-delay: 2s; }
.sticker.s4 { top: 50%; right: 4%; animation-delay: 3s; transform: rotate(-12deg); }
.sticker.s5 { top: 65%; left: 5%; animation-delay: 1.5s; }
.sticker.s6 { top: 78%; right: 5%; animation-delay: 4s; transform: rotate(20deg); }
.sticker.s7 { top: 25%; left: 8%; animation-delay: 2.5s; transform: rotate(-15deg); }
.sticker.s8 { top: 88%; right: 8%; animation-delay: 0.8s; }

@keyframes floatSticker {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-15px) rotate(8deg); }
}

.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255, 228, 240, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--ink);
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo {
  font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700;
  font-size: 1.8rem;
  color: var(--ink);
  text-decoration: none;
  display: inline-block;
  transform: rotate(-2deg);
  position: relative;
}
.logo::after { content: '✦'; position: absolute; top: -10px; right: -15px; font-size: 1rem; color: var(--pink); }
.logo .dot { color: var(--pink-deep); }

.nav-links {
  display: flex;
  gap: 1.8rem;
  font-family: 'Caveat', cursive;
  font-size: 1.3rem;
  font-weight: 600;
}
.nav-links a {
  color: var(--ink);
  text-decoration: none;
  transition: all 0.3s;
  padding: 0.2rem 0.8rem;
  border-radius: 999px;
}
.nav-links a:hover {
  background: var(--pink);
  color: white;
  transform: rotate(-3deg);
}
.nav-links a.active { background: var(--blue); color: white; }

@media (max-width: 640px) {
  .nav-links { gap: 0.5rem; font-size: 1rem; }
  .nav-links a { padding: 0.1rem 0.5rem; }
}

footer {
  text-align: center;
  padding: 5rem 2rem 3rem;
  margin-top: 4rem;
  position: relative;
  z-index: 3;
  border-top: 2px dashed var(--ink);
}
.footer-line {
  font-family: 'Kaisei Decol', 'Noto Sans TC', serif;
  font-size: 1.6rem;
  margin-bottom: 0.8rem;
  color: var(--ink);
}
.footer-meta {
  font-family: 'Dancing Script', cursive;
  font-size: 0.95rem;
  color: var(--ink-soft);
  font-weight: 500;
}

/* === 文章專屬 === */
.article-wrapper {
  max-width: 760px;
  margin: 0 auto;
  padding: 2rem;
  position: relative;
  z-index: 3;
}

.breadcrumb {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--ink-soft);
  letter-spacing: 0.1em;
  margin-bottom: 2rem;
  margin-top: 1rem;
}

.breadcrumb a { color: var(--ink-soft); text-decoration: none; }
.breadcrumb a:hover { color: var(--pink-deep); }
.breadcrumb .sep { margin: 0 0.5rem; opacity: 0.4; }

.article-header {
  text-align: center;
  margin-bottom: 3rem;
}

.tag {
  display: inline-block;
  font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700;
  font-size: 1rem;
  padding: 0.3rem 1.2rem;
  background: var(--pink);
  color: white;
  border: 2px solid var(--ink);
  border-radius: 999px;
  margin-bottom: 1.5rem;
  text-decoration: none;
  box-shadow: 2px 2px 0 var(--ink);
}

.article-title {
  font-family: 'Kaisei Decol', 'Noto Sans TC', serif;
  font-weight: 900;
  font-size: clamp(2rem, 5vw, 3rem);
  line-height: 1.3;
  color: var(--ink);
  margin-bottom: 1.5rem;
  letter-spacing: -0.01em;
}

.article-meta {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--ink-soft);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  flex-wrap: wrap;
}

.article-meta span::before { content: '·'; margin-right: 1.5rem; color: var(--pink-deep); }
.article-meta span:first-child::before { display: none; margin: 0; }

.cover-image {
  aspect-ratio: 16/9;
  border: 2.5px solid var(--ink);
  border-radius: 24px;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  margin-bottom: 3rem;
  position: relative;
  overflow: hidden;
  box-shadow: 5px 5px 0 var(--ink);
}

.cover-image::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.5) 0%, transparent 50%);
}

.cover-sticker {
  position: absolute;
  top: 1.2rem;
  right: 1.2rem;
  font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700;
  font-size: 1.1rem;
  background: var(--yellow);
  color: var(--ink);
  padding: 0.3rem 1rem;
  border: 2px solid var(--ink);
  border-radius: 999px;
  z-index: 2;
  transform: rotate(8deg);
  box-shadow: 2px 2px 0 var(--ink);
}

.article-content {
  font-size: 1.05rem;
  line-height: 1.9;
  color: var(--ink);
}

.article-content p {
  margin-bottom: 1.5rem;
}

.article-content h2 {
  font-family: 'Kaisei Decol', 'Noto Sans TC', serif;
  font-weight: 900;
  font-size: 1.6rem;
  margin: 3rem 0 1rem;
  color: var(--ink);
  position: relative;
  padding-left: 1rem;
  border-left: 4px solid var(--pink-deep);
}

.article-content h3 {
  font-family: 'Kaisei Decol', 'Noto Sans TC', serif;
  font-weight: 700;
  font-size: 1.25rem;
  margin: 2rem 0 0.8rem;
  color: var(--ink);
}

.article-content ul, .article-content ol {
  margin-bottom: 1.5rem;
  padding-left: 1.5rem;
}

.article-content li {
  margin-bottom: 0.5rem;
}

.article-content blockquote {
  background: white;
  border: 2.5px solid var(--ink);
  border-left: 8px solid var(--pink-deep);
  border-radius: 12px;
  padding: 1.2rem 1.5rem;
  margin: 1.8rem 0;
  font-family: 'Kaisei Decol', 'Noto Sans TC', serif;
  font-size: 1.2rem;
  color: var(--ink);
  box-shadow: 4px 4px 0 var(--ink);
}

.article-content a {
  color: var(--pink-deep);
  text-decoration: underline;
  text-decoration-thickness: 1.5px;
  text-underline-offset: 3px;
}

.article-content strong {
  color: var(--ink);
  font-weight: 700;
  background: linear-gradient(transparent 60%, var(--yellow) 60%);
}

/* === 開箱評分卡 === */
.rating-card {
  background: linear-gradient(135deg, var(--yellow-soft) 0%, var(--pink-soft) 100%);
  border: 2.5px solid var(--ink);
  border-radius: 20px;
  padding: 1.8rem 2rem;
  margin: 2.5rem 0;
  text-align: center;
  box-shadow: 5px 5px 0 var(--ink);
}

.rating-label {
  font-family: 'Caveat', cursive;
  font-size: 1.2rem;
  color: var(--pink-deep);
  margin-bottom: 0.3rem;
}

.rating-stars {
  font-size: 2.2rem;
  color: #FFB833;
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
  filter: drop-shadow(2px 2px 0 var(--ink));
}

.rating-score {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 2rem;
  color: var(--ink);
  margin-bottom: 1.2rem;
}

.rating-details {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.6rem 1.5rem;
  text-align: left;
  background: rgba(255, 255, 255, 0.6);
  padding: 1rem 1.2rem;
  border-radius: 12px;
  border: 1.5px dashed var(--ink);
}

.rating-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.95rem;
}

.rating-key {
  color: var(--ink);
  font-weight: 700;
}

.rating-value {
  color: #FFB833;
  letter-spacing: 0.1em;
}

/* === 圖庫網格 === */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.8rem;
  margin: 1.5rem 0 0.5rem;
}

@media (max-width: 600px) {
  .gallery-grid { grid-template-columns: 1fr; }
}

.gallery-item {
  aspect-ratio: 4/3;
  background: var(--bg);
  border: 2px solid var(--ink);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.gallery-placeholder {
  font-family: 'Caveat', cursive;
  font-size: 1.5rem;
  color: var(--ink-soft);
}

.gallery-caption {
  font-size: 0.85rem;
  color: var(--ink-soft);
  text-align: center;
  font-style: italic;
  margin-top: 0.5rem !important;
  margin-bottom: 1.5rem !important;
}

/* === 單張大圖 === */
.single-image {
  margin: 2rem 0;
}

.single-image img {
  width: 100%;
  border: 2.5px solid var(--ink);
  border-radius: 16px;
  box-shadow: 5px 5px 0 var(--ink);
  display: block;
}

.single-image figcaption {
  text-align: center;
  font-size: 0.85rem;
  color: var(--ink-soft);
  font-style: italic;
  margin-top: 0.7rem;
}

/* === 優缺點對照 === */
.pros-cons-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1rem;
  margin: 2rem 0;
}

@media (max-width: 600px) {
  .pros-cons-grid { grid-template-columns: 1fr; }
}

.pros-box, .cons-box {
  border: 2.5px solid var(--ink);
  border-radius: 16px;
  padding: 1.3rem 1.5rem;
  box-shadow: 4px 4px 0 var(--ink);
}

.pros-box {
  background: linear-gradient(135deg, #DFF5E5 0%, #C8EAD3 100%);
}

.cons-box {
  background: linear-gradient(135deg, #FFE0E5 0%, #FFC8CD 100%);
}

.pc-title {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 1.2rem;
  margin-bottom: 0.8rem !important;
  color: var(--ink);
}

.pros-box ul, .cons-box ul {
  margin: 0 !important;
  padding-left: 1.2rem !important;
}

.pros-box li, .cons-box li {
  margin-bottom: 0.4rem !important;
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--ink);
}

.pros-box li::marker {
  content: '✓ ';
  color: #2A9D60;
  font-weight: 700;
}

.cons-box li::marker {
  content: '✕ ';
  color: var(--pink-deep);
  font-weight: 700;
}

/* === 遊戲攻略專用元件 === */

/* 影片嵌入框 */
.game-video-wrap {
  margin: 2.5rem 0;
  text-align: center;
}

.game-video-label {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--ink);
  margin-bottom: 0.8rem !important;
  background: var(--yellow);
  display: inline-block;
  padding: 0.3rem 1.2rem;
  border: 2px solid var(--ink);
  border-radius: 999px;
  box-shadow: 3px 3px 0 var(--ink);
}

.youtube-embed-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  border: 2.5px solid var(--ink);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 6px 6px 0 var(--ink);
  background: #000;
  margin: 0.8rem 0;
}

.youtube-embed-frame iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

.game-video-caption {
  font-size: 0.85rem;
  color: var(--ink-soft);
  font-style: italic;
  margin-top: 0.5rem !important;
}

/* 遊戲基本資訊卡 */
.game-info-card {
  background: linear-gradient(135deg, #E8F2FF 0%, #DCE7FF 100%);
  border: 2.5px solid var(--ink);
  border-radius: 20px;
  padding: 1.5rem 1.8rem;
  margin: 2.5rem 0;
  box-shadow: 5px 5px 0 var(--ink);
}

.game-info-title {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 1.3rem;
  margin-bottom: 1rem !important;
  margin-top: 0 !important;
  color: var(--ink);
  border-bottom: 2px dashed var(--ink);
  padding-bottom: 0.6rem;
}

.game-info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.8rem 1.5rem;
}

@media (max-width: 600px) {
  .game-info-grid { grid-template-columns: 1fr; }
}

.game-info-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5rem 0.8rem;
  background: rgba(255, 255, 255, 0.7);
  border-radius: 8px;
}

.game-info-key {
  color: var(--ink);
  font-weight: 700;
  font-size: 0.9rem;
}

.game-info-value {
  color: var(--ink);
  font-size: 0.9rem;
}

/* 小技巧框 */
.tip-box {
  background: linear-gradient(135deg, #FFF8DC 0%, #FFF2A8 100%);
  border: 2.5px solid var(--ink);
  border-left: 8px solid #FFB833;
  border-radius: 12px;
  padding: 1.2rem 1.5rem;
  margin: 1.8rem 0;
  box-shadow: 4px 4px 0 var(--ink);
}

.tip-label {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--pink-deep);
  margin-bottom: 0.5rem !important;
}

.tip-box p:last-child {
  margin: 0 !important;
  font-size: 0.95rem;
  line-height: 1.7;
}

/* 警告框 */
.warn-box {
  background: linear-gradient(135deg, #FFE0E5 0%, #FFC8CD 100%);
  border: 2.5px solid var(--ink);
  border-left: 8px solid var(--pink-deep);
  border-radius: 12px;
  padding: 1.2rem 1.5rem;
  margin: 1.8rem 0;
  box-shadow: 4px 4px 0 var(--ink);
}

.warn-label {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--pink-deep);
  margin-bottom: 0.5rem !important;
}

.warn-box ul {
  margin: 0 !important;
  padding-left: 1.2rem !important;
}

.warn-box li {
  margin-bottom: 0.4rem !important;
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--ink);
}

/* 步驟清單 */
.step-list {
  margin: 2rem 0;
}

.step-item {
  display: flex;
  gap: 1rem;
  background: white;
  border: 2px solid var(--ink);
  border-radius: 16px;
  padding: 1.2rem 1.5rem;
  margin-bottom: 1rem;
  box-shadow: 3px 3px 0 var(--ink);
  align-items: flex-start;
}

.step-num {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--pink);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 900;
  font-size: 1.2rem;
  border: 2px solid var(--ink);
  box-shadow: 2px 2px 0 var(--ink);
}

.step-content {
  flex: 1;
}

.step-content h4 {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  margin: 0 0 0.4rem !important;
  color: var(--ink);
}

.step-content p {
  margin: 0 !important;
  font-size: 0.92rem;
  line-height: 1.7;
}

/* 聯盟行銷推薦框 */
.affiliate-box {
  background: white;
  border: 2.5px solid var(--ink);
  border-radius: 20px;
  padding: 1.8rem;

<script>
// === 從 Notion 載入文章內容 ===

async function loadPost() {
  // 從網址取得 slug，例如 post.html?slug=iphone-15-review
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  
  if (!slug) {
    console.log('沒有 slug 參數，保留模板內容');
    return;
  }
  
  try {
    const response = await fetch(`/api/notion?type=post&slug=${encodeURIComponent(slug)}`);
    
    if (response.status === 404) {
      showNotFound();
      return;
    }
    
    if (!response.ok) {
      console.error('API 失敗');
      return;
    }
    
    const data = await response.json();
    const post = data.post;
    
    if (!post) {
      showNotFound();
      return;
    }
    
    renderPost(post);
  } catch (e) {
    console.error('載入失敗:', e);
  }
}

function renderPost(post) {
  // 更新 title
  document.title = `${post.title} — 歪腦袋`;
  
  // 更新 meta description
  const metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc && post.excerpt) metaDesc.content = post.excerpt;
  
  // 更新麵包屑最後一段
  const breadcrumb = document.querySelector('.breadcrumb');
  if (breadcrumb) {
    const lastSegment = breadcrumb.querySelector('a:last-of-type, span:last-child');
    // 不改麵包屑了，太複雜
  }
  
  // 更新標籤
  const tagEl = document.querySelector('.article-header .tag');
  if (tagEl && post.tag) {
    tagEl.textContent = post.tag;
    tagEl.className = `tag ${tagClass(post.tag)}`;
  }
  
  // 更新標題
  const titleEl = document.querySelector('.article-title');
  if (titleEl) titleEl.textContent = post.title;
  
  // 更新 meta（日期）
  const metaEl = document.querySelector('.article-meta');
  if (metaEl) {
    const readMin = Math.max(3, Math.ceil((post.blocks?.length || 5) * 0.8));
    metaEl.innerHTML = `${formatDate(post.date)} · ${readMin} MIN READ · BY 歪腦袋`;
  }
  
  // 更新封面圖
  const coverEl = document.querySelector('.cover-image');
  if (coverEl && post.cover) {
    coverEl.style.backgroundImage = `url('${post.cover}')`;
    coverEl.style.backgroundSize = 'cover';
    coverEl.style.backgroundPosition = 'center';
  }
  


  // 根據文章分類更新導覽列 active 狀態
  const navLinks = document.querySelectorAll('.nav-links a');
  const breadcrumbCategoryLink = document.querySelector('.breadcrumb a:nth-of-type(2)');
  
  if (post.category === '遊戲攻略') {
    navLinks.forEach(a => {
      a.classList.remove('active');
      if (a.getAttribute('href') === 'game.html') a.classList.add('active');
    });
    if (breadcrumbCategoryLink) {
      breadcrumbCategoryLink.href = 'game.html';
      breadcrumbCategoryLink.textContent = '遊戲';
    }
  } else if (post.category === '部落格') {
    navLinks.forEach(a => {
      a.classList.remove('active');
      if (a.getAttribute('href') === 'blog.html') a.classList.add('active');
    });
    if (breadcrumbCategoryLink) {
      breadcrumbCategoryLink.href = 'blog.html';
      breadcrumbCategoryLink.textContent = '部落格';
    }
  }
  
    // 更新 hashtags
  const tagsRow = document.getElementById('tags-row');
  if (tagsRow) {
    if (post.hashtags && post.hashtags.length > 0) {
      tagsRow.innerHTML = post.hashtags.map(h => 
        `<a href="#" class="tag-mini"># ${escapeHtml(h)}</a>`
      ).join('');
      tagsRow.style.display = '';
    } else {
      // 沒填 hashtag 就隱藏整區
      tagsRow.style.display = 'none';
    }
  }
  
    // 渲染文章內容
  const contentEl = document.querySelector('.article-content');
  if (contentEl && post.blocks) {
    // 如果是遊戲攻略且有 YouTube ID，先放影片
    let html = '';
    if (post.youtubeId && document.body.dataset.postType === 'game') {
      html += `
        <div class="game-video-wrap">
          <p class="game-video-label">影片版攻略</p>
          <div class="youtube-embed-frame">
            <iframe 
              src="https://www.youtube.com/embed/${post.youtubeId}"
              title="${escapeAttr(post.title)}"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen></iframe>
          </div>
          <p class="game-video-caption">不想看文字？直接看影片版攻略！</p>
        </div>`;
    }
    
    html += renderBlocks(post.blocks);
    contentEl.innerHTML = html;
  }
}

function renderBlocks(blocks) {
  let html = '';
  let i = 0;
  while (i < blocks.length) {
    const block = blocks[i];
    
    // 偵測連續圖片
    if (block.type === 'image') {
      const consecutive = [];
      let j = i;
      while (j < blocks.length && blocks[j].type === 'image') {
        consecutive.push(blocks[j]);
        j++;
      }
      
      if (consecutive.length >= 2) {
        html += '<div class="gallery-grid">';
        consecutive.forEach(imgBlock => {
          const data = imgBlock.image;
          const url = data.type === 'external' ? data.external.url : data.file.url;
          const caption = data.caption?.length ? renderRichText(data.caption) : '';
          html += `<div class="gallery-item"><img src="${escapeAttr(url)}" alt="${escapeAttr(caption)}"></div>`;
        });
        html += '</div>';
        i = j;
        continue;
      }
    }
    
    // 偵測 ✅ 跟 ❌ 連續 → 並排優缺點
    if (block.type === 'callout' && block.callout?.icon?.type === 'emoji' && block.callout.icon.emoji === '✅') {
      const next = blocks[i + 1];
      if (next?.type === 'callout' && next.callout?.icon?.type === 'emoji' && next.callout.icon.emoji === '❌') {
        const prosText = renderRichText(block.callout.rich_text);
        const consText = renderRichText(next.callout.rich_text);
        html += `<div class="pros-cons-grid">${parsePCBox(prosText, block.children, 'pros', '優點')}${parsePCBox(consText, next.children, 'cons', '缺點')}</div>`;
        i += 2;
        continue;
      }
    }
    
    // ⭐ 評分卡：children 為空才向後抓段落
    if (block.type === 'callout' && block.callout?.icon?.type === 'emoji' && 
        (block.callout.icon.emoji === '⭐' || block.callout.icon.emoji === '🌟')) {
      
      const calloutChildren = block.children || [];
      
      if (calloutChildren.length === 0) {
        const collected = [];
        let j = i + 1;
        while (j < blocks.length) {
          const next = blocks[j];
          let lineText = '';
          if (next.type === 'paragraph' && next.paragraph?.rich_text) {
            lineText = next.paragraph.rich_text.map(t => t.plain_text).join('');
          } else if (next.type === 'bulleted_list_item' && next.bulleted_list_item?.rich_text) {
            lineText = next.bulleted_list_item.rich_text.map(t => t.plain_text).join('');
          } else {
            break;
          }
          
          if (/^.+?[:：\-\s]+\d+(?:\.\d+)?$/.test(lineText.trim())) {
            collected.push({ type: 'paragraph', paragraph: { rich_text: [{ plain_text: lineText, annotations: {} }] } });
            j++;
          } else {
            break;
          }
        }
        
        if (collected.length > 0) {
          const calloutText = renderRichText(block.callout.rich_text);
          html += parseRatingCard(calloutText, collected);
          i = j;
          continue;
        }
      }
      // children 有資料 → 走 renderBlock 的正常流程
    }
    
    // 偵測連續 numbered_list_item ≥ 3 個
    if (block.type === 'numbered_list_item') {
      const consecutive = [];
      let j = i;
      while (j < blocks.length && blocks[j].type === 'numbered_list_item') {
        consecutive.push(blocks[j]);
        j++;
      }
      
      if (consecutive.length >= 3) {
        html += '<div class="step-list">';
        consecutive.forEach((stepBlock, idx) => {
          const stepText = renderRichText(stepBlock.numbered_list_item.rich_text);
          html += `<div class="step-item"><div class="step-num">${idx + 1}</div><div class="step-content"><p>${stepText}</p></div></div>`;
        });
        html += '</div>';
        i = j;
        continue;
      }
    }
    
    html += renderBlock(block);
    i++;
  }
  return html;
}

function renderBlock(block) {
  const type = block.type;
  const data = block[type];
  
  switch (type) {
    case 'paragraph':
      return `<p>${renderRichText(data.rich_text)}</p>`;
    case 'heading_1':
      return `<h2>${renderRichText(data.rich_text)}</h2>`;
    case 'heading_2':
      return `<h2>${renderRichText(data.rich_text)}</h2>`;
    case 'heading_3':
      return `<h3>${renderRichText(data.rich_text)}</h3>`;
    case 'bulleted_list_item':
      return `<ul><li>${renderRichText(data.rich_text)}</li></ul>`;
    case 'numbered_list_item':
      return `<ol><li>${renderRichText(data.rich_text)}</li></ol>`;
    case 'quote':
      return `<blockquote>${renderRichText(data.rich_text)}</blockquote>`;
    case 'callout': {
      const calloutText = renderRichText(data.rich_text);
      const icon = data.icon;
      const emoji = icon?.type === 'emoji' ? icon.emoji : '';
      const children = block.children || [];
      
      if (emoji === '💡' || emoji === '🔵' || emoji === '🟢' || emoji === 'ℹ️') {
        return renderGenericCallout(emoji, 'TIP', calloutText, children);
      }
      if (emoji === '⚠️' || emoji === '🚨' || emoji === '🔴') {
        return renderGenericWarn(calloutText, children);
      }
      if (emoji === '⭐' || emoji === '🌟') {
        return parseRatingCard(calloutText, children);
      }
      if (emoji === '✅' || emoji === '✔️') {
        return parsePCBox(calloutText, children, 'pros', '優點');
      }
      if (emoji === '❌' || emoji === '✖️') {
        return parsePCBox(calloutText, children, 'cons', '缺點');
      }
      if (emoji === '🎮' || emoji === '🕹️') {
        return parseGameInfoCard(calloutText, children);
      }
      if (emoji === '💰' || emoji === '🛒' || emoji === '🛍️') {
        return parseAffiliateBox(calloutText, children);
      }
      return renderGenericCallout(emoji, emoji || 'NOTE', calloutText, children);
    }
    case 'image':
      const imgUrl = data.type === 'external' ? data.external.url : data.file.url;
      const caption = data.caption?.length ? renderRichText(data.caption) : '';
      return `<figure class="single-image"><img src="${escapeAttr(imgUrl)}" alt="${escapeAttr(caption)}">${caption ? `<figcaption>${caption}</figcaption>` : ''}</figure>`;
    case 'divider':
      return '<hr>';
    case 'video':
    case 'embed':
      const url = data.url || (data.type === 'external' ? data.external.url : '');
      const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if (ytMatch) {
        return `<div class="game-video-wrap"><div class="youtube-embed-frame"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allowfullscreen></iframe></div></div>`;
      }
      return '';
    default:
      return '';
  }
}

function renderRichText(richText) {
  if (!richText || !richText.length) return '';
  return richText.map(t => {
    let text = escapeHtml(t.plain_text);
    const ann = t.annotations || {};
    if (ann.bold) text = `<strong>${text}</strong>`;
    if (ann.italic) text = `<em>${text}</em>`;
    if (ann.code) text = `<code>${text}</code>`;
    if (t.href) text = `<a href="${escapeAttr(t.href)}" target="_blank" rel="noopener">${text}</a>`;
    return text;
  }).join('');
}

function showNotFound() {
  const contentEl = document.querySelector('.article-content');
  if (contentEl) {
    contentEl.innerHTML = '<p style="text-align:center; padding: 3rem 0;">找不到這篇文章 ☹️<br><br><a href="/">回首頁</a></p>';
  }
  document.title = '找不到文章 — 歪腦袋';

function tagClass(tag) {
  const map = {
    '評測': 'review', '開箱': 'unbox', '推薦': 'recommend',
    '教學': 'tutorial', '心得': 'review', '小知識': 'recommend',
    '新手攻略': 'beginner', '進階技巧': 'advanced', '初見試玩': 'beginner',
    '遊戲攻略': 'beginner'
  };
  return map[tag] || 'review';
}

function formatDate(d) {
  if (!d) return '';
  return d.replace(/-/g, '.').substring(0, 10);
}

// === 漂亮元件 helper 函式 ===

// 把 children blocks 渲染成純文字行陣列
function childrenToLines(children) {
  if (!children || !Array.isArray(children)) return [];
  const lines = [];
  children.forEach(c => {
    const t = c.type;
    const d = c[t];
    if (!d || !d.rich_text) return;
    
    // 串起所有 rich_text 元素
    const fullText = d.rich_text.map(r => r.plain_text || '').join('');
    
    // 用任何換行字元切分（\n、\r、Notion 的特殊字元）
    fullText.split(/[\n\r\u2028\u2029]+/).forEach(l => {
      const trimmed = l.trim();
      if (trimmed) lines.push(trimmed);
    });
  });
  return lines;
}

// 把 children blocks 渲染成 HTML 列表項
function childrenToListItems(children) {
  if (!children || !Array.isArray(children)) return '';
  return children.map(c => {
    const t = c.type;
    const d = c[t];
    if (!d || !d.rich_text) return '';
    return `<li>${renderRichText(d.rich_text)}</li>`;
  }).filter(s => s).join('');
}

// 把 children blocks 渲染成 HTML
function childrenToHtml(children) {
  if (!children || !Array.isArray(children)) return '';
  return children.map(c => {
    const t = c.type;
    const d = c[t];
    if (!d || !d.rich_text) return '';
    return `<p>${renderRichText(d.rich_text)}</p>`;
  }).filter(s => s).join('');
}

// 評分卡：第一行是主分數，第 2 行起是各項
// 例如標註塊：
// ⭐ 4.5
//    外觀: 5
//    功能: 4
//    CP值: 3
function parseRatingCard(headText, children) {
  const lines = [];
  const headPlain = (headText || '').replace(/<[^>]+>/g, '').trim();
  if (headPlain) lines.push(headPlain);
  if (children) {
    childrenToLines(children).forEach(l => lines.push(l));
  }
  
  if (lines.length === 0) {
    return `<div class="tip-box"><p class="tip-label">RATING</p></div>`;
  }
  
  const mainMatch = lines[0].match(/(\d+(?:\.\d+)?)/);
  const mainScore = mainMatch ? parseFloat(mainMatch[1]) : null;
  
  if (!mainScore || mainScore > 5) {
    return `<div class="tip-box"><p class="tip-label">RATING</p><p>${escapeHtml(lines.join(' / '))}</p></div>`;
  }
  
  // 5 顆星，每顆是獨立 span，用 % 表示填充程度
  // 例如 4.5 = 第 1-4 顆 100%、第 5 顆 50%
  const renderStars = (score) => {
    let html = '<span class="star-row">';
    for (let i = 1; i <= 5; i++) {
      let fill = 0;
      if (score >= i) fill = 100;
      else if (score > i - 1) fill = (score - (i - 1)) * 100;
      html += `<span class="star" style="--fill:${fill}%"></span>`;
    }
    html += '</span>';
    return html;
  };
  
  const stars = renderStars(mainScore);
  
  // 各項評分
  let detailsHtml = '';
  const itemLines = lines.slice(1);
  if (itemLines.length > 0) {
    detailsHtml = '<div class="rating-details">';
    itemLines.forEach(line => {
      const m = line.match(/^(.+?)\s*[:：\-—]?\s*(\d+(?:\.\d+)?)\s*$/);
      if (m && m[1].trim()) {
        const s = parseFloat(m[2]);
        detailsHtml += `<div class="rating-item"><span class="rating-key">${escapeHtml(m[1].trim())}</span><span class="rating-value">${renderStars(s)}</span></div>`;
      } else if (line.trim()) {
        detailsHtml += `<div class="rating-item"><span class="rating-key">${escapeHtml(line.trim())}</span></div>`;
      }
    });
    detailsHtml += '</div>';
  }
  
  return `
    <div class="rating-card">
      <p class="rating-label">綜合評分</p>
      <div class="rating-stars">${stars}</div>
      <p class="rating-score">${mainScore} / 5</p>
      ${detailsHtml}
    </div>
  `;
}

// 遊戲資訊卡
// 🎮 第一行可以是描述，後續每行是「項目: 內容」
function parseGameInfoCard(headText, children) {
  const lines = [];
  const headPlain = (headText || '').replace(/<[^>]+>/g, '').trim();
  if (headPlain) lines.push(headPlain);
  if (children) {
    childrenToLines(children).forEach(l => lines.push(l));
  }
  
  if (lines.length === 0) {
    return `<div class="game-info-card"><h3 class="game-info-title">遊戲基本資訊</h3></div>`;
  }
  
  // 把所有行合併、再用 / 或多空格 分隔成多個項目
  const allText = lines.join(' / ');
  
  // 嘗試用 / 拆，如果沒有 / 就用「項目: 內容 項目: 內容」這種模式
  let segments = [];
  if (allText.includes('/')) {
    segments = allText.split(/\s*\/\s*/).map(s => s.trim()).filter(s => s);
  } else {
    // 嘗試用「中文/英文/數字: ... 」模式重複切分
    // 例如 "類型: RPG 平台: Steam, Switch 開發商: 米哈遊"
    // 用正規表達式找出每個 「XX: YY」直到下一個「XX:」
    const matches = allText.match(/[^\s:：][^:：]*?[:：]\s*(?:[^:：]+?(?=\s+[^\s:：]+[:：])|[^:：]+$)/g);
    if (matches) {
      segments = matches.map(s => s.trim()).filter(s => s);
    } else {
      segments = [allText];
    }
  }
  
  let html = '<div class="game-info-card"><h3 class="game-info-title">遊戲基本資訊</h3><div class="game-info-grid">';
  segments.forEach(seg => {
    const m = seg.match(/^(.+?)[:：]\s*(.+)$/);
    if (m) {
      html += `<div class="game-info-item"><span class="game-info-key">${escapeHtml(m[1].trim())}</span><span class="game-info-value">${escapeHtml(m[2].trim())}</span></div>`;
    } else if (seg.trim()) {
      html += `<div class="game-info-item"><span class="game-info-value">${escapeHtml(seg.trim())}</span></div>`;
    }
  });
  html += '</div></div>';
  return html;
}

// 購買連結框
// 💰 第一行：商品名稱
//    第二行：說明
//    第三行：網址
function parseAffiliateBox(headText, children) {
  const lines = [];
  const headPlain = (headText || '').replace(/<[^>]+>/g, '').trim();
  if (headPlain) lines.push(headPlain);
  if (children) {
    childrenToLines(children).forEach(l => lines.push(l));
  }
  
  if (lines.length === 0) {
    return `<div class="affiliate-box"><span class="affiliate-label">PURCHASE</span></div>`;
  }
  
  const urlRegex = /https?:\/\/[^\s,，、]+/;
  
  // 規則：
  // - 第一行有網址 → 第一行整行解析為「標題 + 第一個商場」
  // - 第一行沒網址 → 第一行 = 標題
  // - 之後每行 = 一個商場
  
  let title = '';
  const purchaseRows = [];
  
  lines.forEach((line, idx) => {
    const urlMatch = line.match(urlRegex);
    
    if (!urlMatch) {
      // 沒網址：當標題（如果還沒有）
      if (!title) {
        title = line.trim();
      } else {
        title += ' ' + line.trim();
      }
      return;
    }
    
    const url = urlMatch[0];
    const beforeUrl = line.substring(0, line.indexOf(url)).trim();
    
    if (idx === 0 && !title) {
      // 第一行有網址：把網址前的字依「最後一個短詞」切分為「標題 / 商場」
      const parts = beforeUrl.split(/\s+/).filter(p => p);
      if (parts.length >= 2) {
        // 最後一個短詞當商場
        const lastWord = parts[parts.length - 1];
        if (lastWord.length <= 8) {
          title = parts.slice(0, -1).join(' ');
          purchaseRows.push({ store: lastWord, url: url });
          return;
        }
      }
      // 否則整個當標題、無商場名
      title = beforeUrl || '推薦商品';
      purchaseRows.push({ store: '', url: url });
    } else {
      // 之後的行：網址前的字當商場名
      purchaseRows.push({ store: beforeUrl || `選項 ${purchaseRows.length + 1}`, url: url });
    }
  });
  
  if (!title) title = '推薦商品';
  
  let rowsHtml = '';
  if (purchaseRows.length > 0) {
    rowsHtml = '<div class="affiliate-rows">';
    purchaseRows.forEach(row => {
      const storeName = row.store || '購買連結';
      rowsHtml += `
        <div class="affiliate-row">
          <span class="affiliate-store">${escapeHtml(storeName)}</span>
          <a href="${escapeAttr(row.url)}" target="_blank" rel="noopener" class="affiliate-btn-mini">前往購買 →</a>
        </div>
      `;
    });
    rowsHtml += '</div>';
  }
  
  return `
    <div class="affiliate-box">
      <span class="affiliate-label">PURCHASE</span>
      <h4 class="affiliate-title">${escapeHtml(title)}</h4>
      ${rowsHtml}
    </div>
  `;
}

// 優缺點框（單個）
function parsePCBox(headText, children, type, label) {
  const lines = [];
  const headPlain = (headText || '').replace(/<[^>]+>/g, '').trim();
  if (headPlain) lines.push(headPlain);
  
  if (children && Array.isArray(children)) {
    childrenToLines(children).forEach(l => lines.push(l));
  }
  
  if (lines.length === 0) {
    return `<div class="${type}-box"><h4 class="pc-title">${label}</h4></div>`;
  }
  
  // 永遠顯示為清單
  const items = lines.map(l => `<li>${escapeHtml(l)}</li>`).join('');
  return `<div class="${type}-box"><h4 class="pc-title">${label}</h4><ul class="pc-list">${items}</ul></div>`;
}

// 一般 callout 含 children
function renderGenericCallout(emoji, label, headText, children) {
  let body = headText ? `<p>${headText}</p>` : '';
  if (children && children.length) {
    body += childrenToHtml(children);
  }
  return `<div class="tip-box"><p class="tip-label">${label}</p>${body}</div>`;
}

// 一般 warn box 含 children
function renderGenericWarn(headText, children) {
  let body = headText ? `<p>${headText}</p>` : '';
  if (children && children.length) {
    body += childrenToHtml(children);
  }
  return `<div class="warn-box"><p class="warn-label">注意事項</p>${body}</div>`;
}


function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeAttr(text) {
  if (!text) return '';
  return text.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}
