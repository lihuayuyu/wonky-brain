<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歪腦袋 即時比分（自動）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1B1130;--pink:#FF6FBE;--pink-deep:#FF2E97;--purple:#8A5BFF;--cream:#FFF6FB;--pop:#FFD94A;--white:#fff;--bd:3px solid var(--ink);--op:.6;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:#241d33;font-family:"Zen Maru Gothic","Noto Sans TC",sans-serif;color:var(--cream);overflow:hidden;}
  body.clean{background:transparent;}

  .stage{position:fixed;inset:0;}
  .bug{position:absolute;display:inline-flex;flex-direction:column;gap:7px;}
  .stage[data-pos="tl"] .bug{top:26px;left:26px;align-items:flex-start;}
  .stage[data-pos="tc"] .bug{top:22px;left:50%;transform:translateX(-50%);align-items:center;}
  .stage[data-pos="tr"] .bug{top:26px;right:26px;align-items:flex-end;}
  .stage[data-pos="bl"] .bug{bottom:26px;left:26px;align-items:flex-start;}
  .stage[data-pos="bc"] .bug{bottom:22px;left:50%;transform:translateX(-50%);align-items:center;}

  /* 半透明主橫條：遊戲透得過、字看得清 */
  .bar{
    display:inline-flex;align-items:center;gap:16px;
    background:rgba(23,15,38,var(--op));
    border-radius:14px;padding:10px 20px;
    box-shadow:0 4px 14px rgba(0,0,0,.35);
  }
  .side{display:inline-flex;align-items:center;gap:10px;}
  img.flag{width:44px;height:30px;object-fit:cover;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.5);display:none;}
  .nm{font-weight:900;font-size:21px;color:var(--cream);letter-spacing:.02em;}
  .num{font-family:"DM Mono",monospace;font-weight:500;font-size:42px;line-height:1;color:var(--pop);min-width:30px;text-align:center;transition:transform .18s;}
  .num.flash{animation:pop .6s ease;}
  @keyframes pop{0%{transform:scale(1);}35%{transform:scale(1.55);color:#fff;}100%{transform:scale(1);}}
  .dash{font-family:"DM Mono",monospace;font-size:30px;color:rgba(255,246,251,.45);}
  .live-dot{width:9px;height:9px;border-radius:50%;background:var(--pink-deep);animation:pulse 1.4s infinite;flex:0 0 auto;}
  .live-dot.off{background:#8a7f9e;animation:none;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  .chips{display:flex;gap:7px;}
  .chip{
    display:none;align-items:center;gap:6px;
    background:rgba(23,15,38,calc(var(--op)*0.92));
    border-radius:9px;padding:4px 12px;
    font-family:"DM Mono",monospace;font-size:14px;color:var(--cream);
  }
  .chip b{color:var(--pop);font-weight:500;}
  #min{color:var(--pop);}

  @media (prefers-reduced-motion:reduce){.live-dot,.num.flash{animation:none;}}

  .status{position:fixed;left:26px;bottom:20px;font-family:"DM Mono",monospace;font-size:11px;color:var(--cream);background:rgba(23,15,38,.8);border-radius:6px;padding:4px 9px;display:none;}
  .status.err{display:block!important;background:var(--pink-deep);color:#fff;}
  body.clean .status{display:none;}

  /* ---- panel ---- */
  .panel{position:fixed;left:0;right:0;bottom:0;z-index:50;background:linear-gradient(160deg,var(--pink),var(--purple));border-top:4px solid var(--ink);padding:15px 18px;font-family:"Noto Sans TC",sans-serif;color:var(--ink);}
  body.clean .panel{display:none;}
  .pg{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;max-width:1100px;margin:0 auto;}
  .pc{background:var(--cream);border:var(--bd);box-shadow:4px 4px 0 var(--ink);border-radius:6px;padding:10px 12px;}
  .pc h4{font-family:"DM Mono",monospace;font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--purple);margin-bottom:7px;}
  .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  label.f{display:flex;flex-direction:column;gap:3px;font-size:10px;font-weight:700;color:#6b5b86;}
  input[type=text],select{font-family:"Noto Sans TC","DM Mono",monospace;font-size:14px;border:2.5px solid var(--ink);border-radius:4px;padding:6px 8px;background:#fff;color:var(--ink);}
  input[type=range]{width:130px;accent-color:var(--pink-deep);}
  .btn{font-family:"Noto Sans TC","DM Mono",monospace;font-weight:700;font-size:13px;border:2.5px solid var(--ink);border-radius:5px;box-shadow:3px 3px 0 var(--ink);background:#fff;color:var(--ink);padding:7px 10px;cursor:pointer;}
  .btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}
  .btn.on{background:var(--pop);}
  .btn.live{border-color:var(--pink-deep);}
  #mlist{display:flex;gap:6px;flex-wrap:wrap;max-width:420px;}
  .foot{max-width:1100px;margin:10px auto 0;font-family:"DM Mono",monospace;font-size:11px;color:rgba(27,17,48,.72);line-height:1.7;}
  .foot code{background:var(--ink);color:var(--pop);padding:1px 5px;border-radius:3px;}
</style>
</head>
<body>
  <div class="stage" id="stage" data-pos="tl">
    <div class="bug">
      <div class="bar">
        <span class="live-dot" id="dot"></span>
        <span class="side"><img class="flag" id="fH" alt=""><span class="nm" id="nH">載入中</span></span>
        <span class="num" id="sH">-</span><span class="dash">-</span><span class="num" id="sA">-</span>
        <span class="side"><span class="nm" id="nA">…</span><img class="flag" id="fA" alt=""></span>
      </div>
      <div class="chips">
        <span class="chip" id="min"></span>
        <span class="chip" id="pk">PK <b><span id="pkH">0</span> - <span id="pkA">0</span></b></span>
        <span class="chip" id="vStage"></span>
      </div>
    </div>
  </div>
  <div class="status" id="st"></div>

  <div class="panel">
    <div class="pg">
      <div class="pc"><h4>今天的比賽（點選要顯示哪場）</h4><div id="mlist">載入中…</div></div>
      <div class="pc"><h4>外觀</h4><div class="row">
        <label class="f">透明度<input type="range" id="iOp" min="0.25" max="0.9" step="0.05"></label>
        <label class="f">位置<select id="iPos">
          <option value="tl">左上</option><option value="tc">中上</option><option value="tr">右上</option>
          <option value="bl">左下</option><option value="bc">中下</option></select></label>
        <label class="f">賽段字（可空）<input type="text" id="iStage" placeholder="32 強賽" style="width:100px;"></label>
        <label class="f" style="flex-direction:row;align-items:center;gap:5px;">時間<input type="checkbox" id="iMin"></label>
      </div></div>
      <div class="pc"><h4>手動備援（API 掛了才開）</h4>
        <div class="row"><label class="f" style="flex-direction:row;align-items:center;gap:5px;">啟用<input type="checkbox" id="mOn"></label></div>
        <div id="mBox">
          <div class="row" style="margin-top:7px;">
            <label class="f">主隊<select id="mH" style="width:104px;"></select></label>
            <label class="f">客隊<select id="mA" style="width:104px;"></select></label>
          </div>
          <div class="row" style="margin-top:7px;">
            <button class="btn" id="mSHm">−</button><b id="mSH" style="min-width:18px;text-align:center;">0</b><button class="btn" id="mSHp">＋</button>
            <span style="opacity:.5;">:</span>
            <button class="btn" id="mSAm">−</button><b id="mSA" style="min-width:18px;text-align:center;">0</b><button class="btn" id="mSAp">＋</button>
          </div>
          <div class="row" style="margin-top:7px;">
            <label class="f" style="flex-direction:row;align-items:center;gap:5px;">PK<input type="checkbox" id="mPk"></label>
            <button class="btn" id="mPHm">−</button><b id="mPH" style="min-width:14px;text-align:center;">0</b><button class="btn" id="mPHp">＋</button>
            <span style="opacity:.5;">:</span>
            <button class="btn" id="mPAm">−</button><b id="mPA" style="min-width:14px;text-align:center;">0</b><button class="btn" id="mPAp">＋</button>
          </div>
        </div>
      </div>
      <div class="pc"><h4>輸出</h4><div class="row"><button class="btn" id="bCopy">複製 OBS 網址</button></div></div>
    </div>
    <div class="foot">
      比分每 45 秒自動更新（來源：ESPN 公開資料）。選好比賽、調好外觀 → 按「複製 OBS 網址」貼進 OBS 瀏覽器來源，混合模式用<b>正常</b>。半透明底已內建，遊戲畫面會透出來。<br>
      進球時數字會放大閃一下。PK 大戰會自動多顯示一行 PK 比分。
    </div>
  </div>

  var $=function(id){return document.getElementById(id);};
  var P=new URLSearchParams(location.search);
  var clean=P.get("clean")==="1"||/[?&#]clean/.test(location.search);
  if(clean) document.body.classList.add("clean");

  var opac=parseFloat(P.get("op")||"0.6"); if(isNaN(opac))opac=0.6;
  var teamPick=(P.get("team")||"").toUpperCase();
  var stageTxt=P.get("stage")||"";
  var showMin=P.get("min")!=="0";
  var pos=P.get("pos")||"tl";
  $("stage").dataset.pos=pos;
  document.documentElement.style.setProperty("--op",opac);
  if(stageTxt){$("vStage").textContent=stageTxt;$("vStage").style.display="inline-flex";}

  var matches=[], picked=null, lastErr="";

  /* ---- 手動備援 ---- */
  var MKEY="wonky-score-manual";
  var mbc=("BroadcastChannel" in window)?new BroadcastChannel(MKEY):null;
  var manual={on:false,h:"NED",a:"MAR",sh:0,sa:0,pkOn:false,ph:0,pa:0,v:0};
  var manualApplied=-1;
  try{ var ms=JSON.parse(localStorage.getItem(MKEY)); if(ms){manual=Object.assign(manual,ms);manualApplied=manual.v;} }catch(e){}
  function mSave(){ manual.v=Date.now(); manualApplied=manual.v;
    try{localStorage.setItem(MKEY,JSON.stringify(manual));}catch(e){}
    if(mbc) mbc.postMessage(manual); renderAll(); }
  function mAdopt(s){ if(!s)return; manual=Object.assign(manual,s); manualApplied=s.v; renderAll(); if(!clean&&window.syncManualUI) window.syncManualUI(); }
  if(mbc) mbc.onmessage=function(e){ mAdopt(e.data); };
  setInterval(function(){ try{ var s=JSON.parse(localStorage.getItem(MKEY)); if(s&&s.v>manualApplied) mAdopt(s); }catch(e){} },400);

  function norm(j){
    var out=[]; (j.events||[]).forEach(function(ev){
      var c=(ev.competitions||[])[0]||{};
      var st=c.status||ev.status||{};
      var cs=c.competitors||[];
      var h=null,a=null;
      cs.forEach(function(x){ if(x.homeAway==="home")h=x; if(x.homeAway==="away")a=x; });
      h=h||cs[0]||{}; a=a||cs[1]||{};
      function side(x){ var t=x.team||{};
        return {abbr:String(t.abbreviation||"").toUpperCase(), name:t.shortDisplayName||t.displayName||"",
                score:(x.score!=null&&x.score!=="")?String(x.score):"-",
                pk:(x.shootoutScore!=null&&x.shootoutScore!=="")?String(x.shootoutScore):null}; }
      out.push({id:String(ev.id||""), date:ev.date||"",
        state:(st.type&&st.type.state)||"", detail:(st.type&&st.type.shortDetail)||(st.type&&st.type.description)||"",
        clock:st.displayClock||"", home:side(h), away:side(a)});
    }); return out;
  }

  function pick(){
    if(!matches.length) return null;
    if(teamPick){ for(var i=0;i<matches.length;i++){ var m=matches[i];
      if(m.home.abbr===teamPick||m.away.abbr===teamPick) return m; } }
    for(var i=0;i<matches.length;i++) if(matches[i].state==="in") return matches[i];
    for(var i=0;i<matches.length;i++) if(matches[i].state==="pre") return matches[i];
    return matches[matches.length-1];
  }

  function info(abbr,fallbackName){ var m=MAP[abbr];
    return m?{flag:FLAGS[m[0]]||"",zh:m[1]}:{flag:"",zh:fallbackName||abbr||"—"}; }

  var lastH=null,lastA=null,lastId=null;
  function flash(el){ el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash"); }

  function renderAll(){ if(manual.on) renderManual(); else render(); }

  function renderManual(){
    var H=info(manual.h,manual.h), A=info(manual.a,manual.a);
    if(H.flag){$("fH").src=H.flag;$("fH").style.display="block";}else{$("fH").style.display="none";}
    if(A.flag){$("fA").src=A.flag;$("fA").style.display="block";}else{$("fA").style.display="none";}
    $("nH").textContent=H.zh; $("nA").textContent=A.zh;
    $("sH").textContent=manual.sh; $("sA").textContent=manual.sa;
    if(manual.pkOn){ $("pkH").textContent=manual.ph; $("pkA").textContent=manual.pa; $("pk").style.display="inline-flex"; }
    else $("pk").style.display="none";
    $("dot").classList.remove("off");
    $("min").style.display="none";
  }

  function render(){
    var m=picked;
    if(!m){ $("nH").textContent="等待比賽"; $("nA").textContent="資料中"; return; }
    var H=info(m.home.abbr,m.home.name), A=info(m.away.abbr,m.away.name);
    if(H.flag){$("fH").src=H.flag;$("fH").style.display="block";}else{$("fH").style.display="none";}
    if(A.flag){$("fA").src=A.flag;$("fA").style.display="block";}else{$("fA").style.display="none";}
    $("nH").textContent=H.zh; $("nA").textContent=A.zh;
    if(m.id===lastId){
      if(lastH!==null&&m.home.score!==lastH) flash($("sH"));
      if(lastA!==null&&m.away.score!==lastA) flash($("sA"));
    }
    $("sH").textContent=m.home.score; $("sA").textContent=m.away.score;
    lastH=m.home.score; lastA=m.away.score; lastId=m.id;
    if(m.home.pk!==null&&m.away.pk!==null){ $("pkH").textContent=m.home.pk; $("pkA").textContent=m.away.pk; $("pk").style.display="inline-flex"; }
    else $("pk").style.display="none";
    var live=(m.state==="in");
    $("dot").classList.toggle("off",!live);
    var mm= live ? (m.clock||m.detail) : (m.state==="pre"?"未開賽":m.detail||"FT");
    if(showMin&&mm){ $("min").textContent=mm; $("min").style.display="inline-flex"; } else $("min").style.display="none";
  }

  function normFetch(u){ return fetch(u,{cache:"no-store"}).then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); }); }
  var ESPN="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard";

  function tick(){
    normFetch("/api/score?_="+Date.now()).then(function(j){ matches=j.matches?j.matches:norm(j); done(); })
    .catch(function(){ normFetch(ESPN+"?_="+Date.now()).then(function(j){ matches=norm(j); done(); })
      .catch(function(e){ lastErr=String(e); setStat(true); }); });
  }
  function done(){ picked=pick(); renderAll(); setStat(false); }
  function setStat(err){ var s=$("st");
    if(err){ s.textContent="⚠ 抓不到比分（"+lastErr+"），重試中"; s.classList.add("err"); s.style.display="block"; }
    else { s.classList.remove("err"); s.textContent="已更新 "+new Date().toLocaleTimeString(); s.style.display=clean?"none":"block"; } }
  tick(); setInterval(tick,20000); renderAll();

  /* ---- control panel ---- */
  function panelList(){
    var box=$("mlist"); if(!box) return; box.innerHTML="";
    if(!matches.length){ box.textContent="今天沒有比賽資料"; return; }
    matches.forEach(function(m){
      var H=info(m.home.abbr,m.home.name), A=info(m.away.abbr,m.away.name);
      var b=document.createElement("button"); b.className="btn m"+(m.state==="in"?" live":"");
      b.textContent=H.zh+" vs "+A.zh+(m.state==="in"?"（LIVE）":m.state==="pre"?"（未開賽）":"（已結束）");
      b.onclick=function(){ teamPick=m.home.abbr; picked=m; render(); markSel(); };
      b.dataset.abbr=m.home.abbr;
      box.appendChild(b);
    });
    markSel();
  }
  function markSel(){ var bs=document.querySelectorAll("#mlist .btn"); bs.forEach(function(b){ b.classList.toggle("on", picked&&b.dataset.abbr===picked.home.abbr); }); }

  if(!clean){
    /* 手動備援 UI */
    function fillTeams(sel){ Object.keys(MAP).forEach(function(k){ var o=document.createElement("option"); o.value=k; o.textContent=MAP[k][1]; sel.appendChild(o); }); }
    fillTeams($("mH")); fillTeams($("mA"));
    function syncManualUI(){
      $("mOn").checked=manual.on; $("mH").value=manual.h; $("mA").value=manual.a;
      $("mSH").textContent=manual.sh; $("mSA").textContent=manual.sa;
      $("mPk").checked=manual.pkOn; $("mPH").textContent=manual.ph; $("mPA").textContent=manual.pa;
      $("mBox").style.opacity=manual.on?"1":"0.45";
    }
    window.syncManualUI=syncManualUI;
    $("mOn").addEventListener("change",function(e){ manual.on=e.target.checked; mSave(); syncManualUI(); });
    $("mH").addEventListener("change",function(e){ manual.h=e.target.value; mSave(); });
    $("mA").addEventListener("change",function(e){ manual.a=e.target.value; mSave(); });
    $("mPk").addEventListener("change",function(e){ manual.pkOn=e.target.checked; mSave(); });
    [["mSHp","sh",1],["mSHm","sh",-1],["mSAp","sa",1],["mSAm","sa",-1],["mPHp","ph",1],["mPHm","ph",-1],["mPAp","pa",1],["mPAm","pa",-1]].forEach(function(cfg){
      $(cfg[0]).addEventListener("click",function(){ manual[cfg[1]]=Math.max(0,manual[cfg[1]]+cfg[2]); mSave(); syncManualUI(); });
    });
    syncManualUI();

    $("iOp").value=opac;
    $("iOp").addEventListener("input",function(e){ opac=parseFloat(e.target.value); document.documentElement.style.setProperty("--op",opac); });
    $("iPos").value=pos;
    $("iPos").addEventListener("change",function(e){ pos=e.target.value; $("stage").dataset.pos=pos; });
    $("iStage").value=stageTxt;
    $("iStage").addEventListener("input",function(e){ stageTxt=e.target.value;
      if(stageTxt){$("vStage").textContent=stageTxt;$("vStage").style.display="inline-flex";} else $("vStage").style.display="none"; });
    $("iMin").checked=showMin;
    $("iMin").addEventListener("change",function(e){ showMin=e.target.checked; render(); });
    $("bCopy").addEventListener("click",function(e){
      var p=new URLSearchParams(); p.set("clean","1");
      if(teamPick)p.set("team",teamPick); p.set("pos",pos); p.set("op",String(opac));
      if(stageTxt)p.set("stage",stageTxt); if(!showMin)p.set("min","0");
      var url=location.href.split("#")[0].split("?")[0]+"?"+p.toString();
      navigator.clipboard.writeText(url).then(function(){ e.target.textContent="已複製！"; setTimeout(function(){e.target.textContent="複製 OBS 網址";},1500); })
      .catch(function(){ window.prompt("複製這個網址貼到 OBS：",url); });
    });
  }
})();

</script>
</body>
</html>
