<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字數計算・社群貼文字數即時統計</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kaisei+Decol:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF5FA;
    --ink: #4A3A5C;
    --ink-soft: #8B7BA0;
    --pink: #FF8FAF;
    --pink-soft: #FFC8DD;
    --pink-deep: #E8538A;
    --blue: #A8C8FF;
    --blue-soft: #D4E2FF;
    --blue-deep: #6B9DFF;
    --yellow: #FFE9A8;
    --yellow-soft: #FFF5D1;
    --green: #B8E5C8;
    --green-deep: #6BC48F;
    --purple: #D4C0FF;
    --purple-deep: #B294E0;
    --grid-line: rgba(232, 83, 138, 0.18);
    --line: rgba(74, 58, 92, 0.15);
    --shadow: 3px 3px 0 var(--ink);
    --shadow-sm: 2px 2px 0 var(--ink);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background: linear-gradient(135deg, #FFE4F0 0%, #FFD6EA 50%, #F5DCFF 100%);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255, 150, 195, 0.5) 0%, transparent 35%),
      radial-gradient(circle at 80% 15%, rgba(220, 200, 255, 0.45) 0%, transparent 40%),
      radial-gradient(circle at 50% 60%, rgba(255, 195, 220, 0.5) 0%, transparent 45%),
      radial-gradient(circle at 90% 75%, rgba(230, 200, 255, 0.45) 0%, transparent 35%),
      radial-gradient(circle at 10% 85%, rgba(255, 180, 210, 0.5) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
    filter: blur(2px);
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 35px 35px;
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: multiply;
  }
  header, main, .toast { position: relative; z-index: 2; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255, 228, 240, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--ink);
    padding: 16px 32px 14px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--ink);
    transform: rotate(-2deg);
    position: relative;
  }
  .brand h1::after {
    content: '✏️';
    position: absolute;
    top: -10px;
    right: -24px;
    font-size: 15px;
    transform: rotate(15deg);
  }
  .brand .sub {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--pink-deep);
    font-weight: 600;
    transform: rotate(-1deg);
  }
  .donate-btn {
    display: flex;
    align-items: center;
    height: 40px;
    padding: 6px 14px;
    border-radius: 12px;
    color: #F8E0BE;
    background-color: #AD5138;
    border: 2px solid var(--ink);
    text-decoration: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 600;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s;
    gap: 8px;
    white-space: nowrap;
  }
  .donate-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: var(--shadow);
    background-color: #C25E45;
  }
  .donate-icon { width: 26px; height: 26px; flex-shrink: 0; display: block; }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* 統計卡 */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
  }
  .stat-card {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow-sm);
    text-align: center;
    transition: all 0.2s;
  }
  .stat-card:hover { transform: translate(-1px, -1px); box-shadow: var(--shadow); }
  .stat-card.primary { background: var(--pink-deep); }
  .stat-card.primary .num { color: white; }
  .stat-card.primary .label { color: rgba(255,255,255,0.85); }
  .stat-card .num {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
  }
  .stat-card .label {
    font-family: 'Kaisei Decol', serif;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  /* 文字輸入 */
  .editor-card {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 18px;
    padding: 20px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .editor-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .editor-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 16px;
    font-weight: 700;
  }
  .editor-actions { display: flex; gap: 8px; }
  .text-area {
    width: 100%;
    min-height: 280px;
    padding: 16px;
    border: 2px solid var(--ink);
    border-radius: 14px;
    background: var(--yellow-soft);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    line-height: 1.8;
    resize: vertical;
    color: var(--ink);
  }
  .text-area:focus { outline: none; background: white; box-shadow: var(--shadow-sm); }
  .text-area::placeholder { color: var(--ink-soft); opacity: 0.6; }

  /* 平台限制檢查 */
  .platform-card {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 18px;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .platform-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--ink);
  }
  .platform-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .platform-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .platform-name {
    font-size: 14px;
    font-weight: 700;
    width: 110px;
    flex-shrink: 0;
    color: var(--ink);
  }
  .platform-bar-wrap {
    flex: 1;
    height: 20px;
    background: var(--yellow-soft);
    border: 2px solid var(--ink);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .platform-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--green-deep));
    transition: width 0.3s, background 0.3s;
    border-radius: 999px 0 0 999px;
  }
  .platform-bar.warn { background: linear-gradient(90deg, var(--yellow), #FFB833); }
  .platform-bar.over { background: linear-gradient(90deg, var(--pink), var(--pink-deep)); }
  .platform-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    width: 110px;
    text-align: right;
    flex-shrink: 0;
    color: var(--ink-soft);
  }
  .platform-count.over { color: var(--pink-deep); }

  .btn {
    font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 8px 14px;
    background: white;
    border: 2px solid var(--ink);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 999px;
    box-shadow: var(--shadow-sm);
    white-space: nowrap;
  }
  .btn:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: var(--shadow); background: var(--pink-soft); }
  .btn.danger { background: var(--pink); color: white; }
  .btn.danger:hover { background: var(--pink-deep); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 12px 22px;
    font-size: 14px;
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 var(--pink-deep);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 1000;
    border-radius: 999px;
    font-weight: 500;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>字數計算</h1>
    <div class="sub">歪腦袋小工具 · v1.0</div>
  </div>
  <a class="donate-btn" href="https://fernfern.bobaboba.me" target="_blank" rel="noopener">
    <svg class="donate-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 7 L7.5 21 Q7.7 22.2 9 22.2 L15 22.2 Q16.3 22.2 16.5 21 L19 7 Z" fill="#F8E0BE" stroke="#3A2618" stroke-width="1.3" stroke-linejoin="round"/>
      <ellipse cx="12" cy="7" rx="7" ry="1.6" fill="#C48A60" stroke="#3A2618" stroke-width="1.3"/>
      <path d="M14 2 L13 8" stroke="#E85A5A" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="10" cy="17" r="1.3" fill="#3A2618"/>
      <circle cx="13" cy="18.5" r="1.3" fill="#3A2618"/>
      <circle cx="11" cy="14" r="1.2" fill="#3A2618"/>
      <circle cx="14" cy="15.5" r="1.2" fill="#3A2618"/>
    </svg>
    <div>歡迎餵食我 🤤</div>
  </a>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card primary">
      <div class="num" id="statChars">0</div>
      <div class="label">字元數（含空白）</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statCharsNoSpace">0</div>
      <div class="label">字元數（不含空白）</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statChinese">0</div>
      <div class="label">中文字</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statWords">0</div>
      <div class="label">英文單字</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statLines">0</div>
      <div class="label">行數</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statParagraphs">0</div>
      <div class="label">段落數</div>
    </div>
  </div>

  <div class="editor-card">
    <div class="editor-header">
      <div class="editor-title">輸入或貼上文字</div>
      <div class="editor-actions">
        <button class="btn" id="btnPaste">📋 貼上</button>
        <button class="btn danger" id="btnClear">✕ 清空</button>
      </div>
    </div>
    <textarea class="text-area" id="textInput" placeholder="在這裡輸入或貼上文字，上方會即時計算字數...&#10;&#10;💡 適合：&#10;• 寫 Threads / IG 限字數貼文&#10;• 算文章字數&#10;• 檢查 YouTube 標題長度"></textarea>
  </div>

  <div class="platform-card">
    <div class="platform-title">📱 社群平台字數限制檢查</div>
    <div class="platform-list" id="platformList"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 2000);
}

// 各平台字數限制
const platforms = [
  { name: 'Threads', limit: 500 },
  { name: 'X / Twitter', limit: 280 },
  { name: 'IG 貼文', limit: 2200 },
  { name: 'FB 貼文', limit: 63206 },
  { name: 'YT 標題', limit: 100 },
  { name: 'YT 說明', limit: 5000 },
];

function analyze() {
  const text = $('textInput').value;

  // 字元數
  const chars = Array.from(text).length;
  const charsNoSpace = Array.from(text.replace(/\s/g, '')).length;

  // 中文字（CJK 統一表意文字）
  const chineseMatches = text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g);
  const chinese = chineseMatches ? chineseMatches.length : 0;

  // 英文單字
  const wordMatches = text.match(/[a-zA-Z]+(?:'[a-zA-Z]+)?/g);
  const words = wordMatches ? wordMatches.length : 0;

  // 行數
  const lines = text === '' ? 0 : text.split(/\r?\n/).length;

  // 段落數（連續非空行算一段）
  const paragraphs = text.trim() === '' ? 0 :
    text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;

  $('statChars').textContent = chars.toLocaleString();
  $('statCharsNoSpace').textContent = charsNoSpace.toLocaleString();
  $('statChinese').textContent = chinese.toLocaleString();
  $('statWords').textContent = words.toLocaleString();
  $('statLines').textContent = lines.toLocaleString();
  $('statParagraphs').textContent = paragraphs.toLocaleString();

  renderPlatforms(chars);
}

function renderPlatforms(charCount) {
  const list = $('platformList');
  list.innerHTML = '';
  platforms.forEach(p => {
    const pct = Math.min(100, (charCount / p.limit) * 100);
    const over = charCount > p.limit;
    const warn = pct >= 80 && !over;
    const barClass = over ? 'over' : (warn ? 'warn' : '');
    const remaining = p.limit - charCount;

    const item = document.createElement('div');
    item.className = 'platform-item';
    item.innerHTML = `
      <div class="platform-name">${p.name}</div>
      <div class="platform-bar-wrap">
        <div class="platform-bar ${barClass}" style="width:${pct}%"></div>
      </div>
      <div class="platform-count ${over ? 'over' : ''}">
        ${over ? `超出 ${Math.abs(remaining).toLocaleString()}` : `剩 ${remaining.toLocaleString()}`}
      </div>
    `;
    list.appendChild(item);
  });
}

$('textInput').addEventListener('input', analyze);

$('btnPaste').addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    if (text) {
      $('textInput').value = text;
      analyze();
      toast('✓ 已貼上');
    }
  } catch (e) {
    toast('讀取剪貼簿失敗，請改用 Ctrl+V');
  }
});

$('btnClear').addEventListener('click', () => {
  if (!$('textInput').value) return;
  if ($('btnClear').dataset.confirm === '1') {
    $('textInput').value = '';
    analyze();
    $('btnClear').dataset.confirm = '0';
    $('btnClear').textContent = '✕ 清空';
    toast('已清空');
    return;
  }
  $('btnClear').dataset.confirm = '1';
  $('btnClear').textContent = '⚠ 再按一次';
  setTimeout(() => {
    $('btnClear').dataset.confirm = '0';
    $('btnClear').textContent = '✕ 清空';
  }, 3000);
});

// 初始
analyze();
</script>
</body>
</html>
