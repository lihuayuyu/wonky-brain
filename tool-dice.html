<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上骰子・3D 多面骰 × 桌遊神器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kaisei+Decol:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF5FA;
    --ink: #4A3A5C;
    --ink-soft: #8B7BA0;
    --pink: #FF8FAF;
    --pink-soft: #FFC8DD;
    --pink-deep: #E8538A;
    --blue: #A8C8FF;
    --blue-soft: #D4E2FF;
    --blue-deep: #6B9DFF;
    --yellow: #FFE9A8;
    --yellow-soft: #FFF5D1;
    --green: #B8E5C8;
    --green-deep: #6BC48F;
    --purple: #D4C0FF;
    --purple-deep: #B294E0;
    --grid-line: rgba(232, 83, 138, 0.18);
    --line: rgba(74, 58, 92, 0.15);
    --shadow: 3px 3px 0 var(--ink);
    --shadow-sm: 2px 2px 0 var(--ink);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background: linear-gradient(135deg, #FFE4F0 0%, #FFD6EA 50%, #F5DCFF 100%);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255, 150, 195, 0.5) 0%, transparent 35%),
      radial-gradient(circle at 80% 15%, rgba(220, 200, 255, 0.45) 0%, transparent 40%),
      radial-gradient(circle at 50% 60%, rgba(255, 195, 220, 0.5) 0%, transparent 45%),
      radial-gradient(circle at 90% 75%, rgba(230, 200, 255, 0.45) 0%, transparent 35%),
      radial-gradient(circle at 10% 85%, rgba(255, 180, 210, 0.5) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
    filter: blur(2px);
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 35px 35px;
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: multiply;
  }
  header, main, .toast { position: relative; z-index: 2; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255, 228, 240, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--ink);
    padding: 16px 32px 14px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--ink);
    transform: rotate(-2deg);
    position: relative;
  }
  .brand h1::after {
    content: '🎲';
    position: absolute;
    top: -8px;
    right: -22px;
    font-size: 16px;
    transform: rotate(15deg);
  }
  .brand .sub {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--pink-deep);
    font-weight: 600;
    transform: rotate(-1deg);
  }
  .donate-btn {
    display: flex;
    align-items: center;
    height: 40px;
    padding: 6px 14px;
    border-radius: 12px;
    color: #F8E0BE;
    background-color: #AD5138;
    border: 2px solid var(--ink);
    text-decoration: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 600;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s;
    gap: 8px;
    white-space: nowrap;
  }
  .donate-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: var(--shadow);
    background-color: #C25E45;
  }
  .donate-icon { width: 26px; height: 26px; flex-shrink: 0; display: block; }

  main {
    display: grid;
    grid-template-columns: 1fr 360px;
    min-height: calc(100vh - 70px);
  }
  @media (max-width: 980px) { main { grid-template-columns: 1fr; } }

  .workspace {
    padding: 28px;
    border-right: 2px solid var(--ink);
    display: flex;
    flex-direction: column;
    gap: 22px;
    min-width: 0;
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .sidebar {
    padding: 24px;
    background: rgba(255, 245, 250, 0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-height: calc(100vh - 70px);
    overflow-y: auto;
    font-size: 15px;
  }

  /* ─── 骰子選擇 ─── */
  .dice-selector {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 18px;
    padding: 16px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .dice-types {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  @media (max-width: 600px) {
    .dice-types { grid-template-columns: repeat(3, 1fr); }
  }
  .dice-type-btn {
    padding: 10px 4px;
    background: white;
    border: 2px solid var(--ink);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
  }
  .dice-type-btn:hover {
    background: var(--pink-soft);
    transform: translate(-1px, -1px);
    box-shadow: var(--shadow-sm);
  }
  .dice-type-btn.active {
    background: var(--ink);
    color: white;
    box-shadow: var(--shadow-sm);
  }
  .dice-type-btn .name {
    display: block;
    font-size: 16px;
    font-weight: 900;
  }
  .dice-type-btn .sub {
    display: block;
    font-size: 10px;
    opacity: 0.7;
    margin-top: 2px;
  }

  .dice-count-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-top: 1.5px dashed var(--line);
    padding-top: 12px;
  }
  .dice-count-row label {
    font-size: 14px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .count-btn {
    width: 32px; height: 32px;
    border: 2px solid var(--ink);
    background: white;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
    transition: all 0.15s;
    color: var(--ink);
  }
  .count-btn:hover { background: var(--pink-soft); transform: scale(1.1); }
  .count-display {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    min-width: 56px;
    text-align: center;
    color: var(--ink);
    padding: 4px 8px;
    background: var(--yellow-soft);
    border: 2px solid var(--ink);
    border-radius: 999px;
  }
  .modifier-input {
    width: 64px;
    padding: 6px 8px;
    border: 2px solid var(--ink);
    background: white;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
  }
  .dice-formula {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--pink-deep);
    padding: 6px 14px;
    background: var(--pink-soft);
    border: 2px solid var(--ink);
    border-radius: 999px;
    margin-left: auto;
  }

  /* ─── 主舞台 ─── */
  .dice-stage {
    flex: 1;
    background: linear-gradient(180deg, #FFFAFC 0%, #FFF0F8 100%);
    border: 2px solid var(--ink);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 440px;
    position: relative;
    overflow: hidden;
  }
  .dice-stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(255, 200, 220, 0.4) 0%, transparent 50%),
      radial-gradient(circle at 70% 70%, rgba(220, 200, 255, 0.4) 0%, transparent 50%);
    pointer-events: none;
  }

  .dice-area {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    perspective: 1200px;
    position: relative;
    z-index: 1;
  }

  /* ─── 3D 骰子基本 ─── */
  .die {
    width: 90px;
    height: 90px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s linear;
  }
  .die.rolling {
    animation: shake 0.08s linear infinite;
  }
  @keyframes shake {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .die-face {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #FFFFFF 0%, #FFE4F0 100%);
    border: 2px solid var(--ink);
    color: var(--ink);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    box-shadow: inset 0 0 12px rgba(232,83,138,0.15);
    backface-visibility: visible;
  }
  .die-face.winner {
    background: linear-gradient(135deg, var(--yellow) 0%, #FFD97A 100%);
    box-shadow: inset 0 0 12px rgba(232,83,138,0.25), 0 0 18px var(--yellow);
  }

  /* D6 (cube) */
  .die.d6 .die-face {
    width: 90px;
    height: 90px;
    border-radius: 16px;
    font-size: 44px;
  }
  .die.d6 .f1 { transform: translateZ(45px); }
  .die.d6 .f2 { transform: rotateY(90deg) translateZ(45px); }
  .die.d6 .f3 { transform: rotateY(180deg) translateZ(45px); }
  .die.d6 .f4 { transform: rotateY(-90deg) translateZ(45px); }
  .die.d6 .f5 { transform: rotateX(90deg) translateZ(45px); }
  .die.d6 .f6 { transform: rotateX(-90deg) translateZ(45px); }

  /* D4 / D8 / D10 / D12 / D20 — 用簡化的「翻轉中、停下顯示」呈現
     避免做超複雜多面體 transform，仍有 3D 翻滾感 */
  .die.d4, .die.d8, .die.d10, .die.d12, .die.d20 {
    transform-style: preserve-3d;
  }
  .die.d4 .die-face, .die.d8 .die-face, .die.d10 .die-face,
  .die.d12 .die-face, .die.d20 .die-face {
    width: 90px;
    height: 90px;
    font-size: 36px;
  }
  /* 用不同 clip-path 做形狀 */
  .die.d4 .die-face {
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    border: none;
    background: linear-gradient(135deg, var(--pink-soft) 0%, var(--pink) 100%);
    color: white;
    text-shadow: 1px 1px 0 var(--ink);
    padding-top: 24px;
    box-shadow: none;
  }
  .die.d8 .die-face {
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    border: none;
    background: linear-gradient(135deg, var(--blue-soft) 0%, var(--blue-deep) 100%);
    color: white;
    text-shadow: 1px 1px 0 var(--ink);
    box-shadow: none;
  }
  .die.d10 .die-face {
    clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
    border: none;
    background: linear-gradient(135deg, var(--green) 0%, var(--green-deep) 100%);
    color: white;
    text-shadow: 1px 1px 0 var(--ink);
    box-shadow: none;
  }
  .die.d12 .die-face {
    clip-path: polygon(50% 0%, 90% 25%, 100% 75%, 60% 100%, 40% 100%, 0% 75%, 10% 25%);
    border: none;
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-deep) 100%);
    color: white;
    text-shadow: 1px 1px 0 var(--ink);
    box-shadow: none;
  }
  .die.d20 .die-face {
    clip-path: polygon(50% 0%, 95% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 5% 25%);
    border: none;
    background: linear-gradient(135deg, var(--yellow) 0%, #FFB833 100%);
    color: var(--ink);
    text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
    box-shadow: none;
    font-weight: 900;
  }
  /* 多面骰旋轉中效果 */
  .die.d4.rolling, .die.d8.rolling, .die.d10.rolling,
  .die.d12.rolling, .die.d20.rolling {
    animation: spin 0.4s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }
  /* D6 旋轉中效果 */
  .die.d6.rolling {
    animation: cubeRoll 0.5s linear infinite;
  }
  @keyframes cubeRoll {
    0% { transform: rotateX(0deg) rotateY(0deg); }
    100% { transform: rotateX(720deg) rotateY(720deg); }
  }

  /* 骰子下方陰影 */
  .die-shadow {
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 8px;
    background: radial-gradient(ellipse, rgba(74,58,92,0.3) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .die.rolling + .die-shadow {
    width: 50px;
    opacity: 0.6;
  }

  /* ─── 結果區 ─── */
  .result-summary {
    margin-top: 32px;
    background: white;
    border: 2px solid var(--ink);
    border-radius: 18px;
    padding: 20px 28px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  .result-summary.hidden { opacity: 0.4; }
  .result-label {
    font-family: 'Kaisei Decol', serif;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .result-individual {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    padding: 6px 14px;
    background: var(--yellow-soft);
    border: 2px solid var(--ink);
    border-radius: 999px;
  }
  .result-total {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--pink-deep);
    text-shadow: 2px 2px 0 var(--ink);
    padding: 4px 20px;
  }
  .result-modifier {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .result-modifier b { color: var(--ink); font-weight: 700; }

  /* ─── 大投擲按鈕 ─── */
  .roll-btn {
    margin-top: 24px;
    font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 24px;
    padding: 18px 56px;
    background: var(--pink-deep);
    color: white;
    border: 3px solid var(--ink);
    cursor: pointer;
    border-radius: 999px;
    box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.15s;
    letter-spacing: 0.06em;
    position: relative;
    z-index: 1;
  }
  .roll-btn:hover:not(:disabled) {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
    background: var(--pink);
  }
  .roll-btn:active:not(:disabled) {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .roll-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ─── 一般 btn ─── */
  .btn {
    font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 9px 16px;
    background: white;
    border: 2px solid var(--ink);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
    border-radius: 999px;
    box-shadow: var(--shadow-sm);
    white-space: nowrap;
  }
  .btn:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: var(--shadow); background: var(--pink-soft); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.danger { background: var(--pink); color: white; }
  .btn.danger:hover:not(:disabled) { background: var(--pink-deep); }
  .btn.sm { padding: 6px 12px; font-size: 12px; }

  /* ─── Sidebar 元件 ─── */
  .section { display: flex; flex-direction: column; gap: 10px; }
  .section-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 17px;
    font-weight: 700;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--ink);
    color: var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title .badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--ink);
    color: white;
    padding: 2px 8px;
    font-weight: 500;
    border-radius: 999px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 360px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .history-item {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    transition: all 0.15s;
  }
  .history-item:hover { background: var(--yellow-soft); }
  .history-item .formula {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    color: var(--pink-deep);
    min-width: 60px;
  }
  .history-item .result {
    flex: 1;
    font-family: 'DM Mono', monospace;
    color: var(--ink-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-item .total {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    color: var(--ink);
    font-size: 14px;
  }
  .history-item .time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
  }

  .empty-state {
    text-align: center;
    color: var(--ink-soft);
    padding: 20px;
    font-size: 13px;
    font-style: italic;
  }

  /* ─── 統計 ─── */
  .stats-controls {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .stats-tab {
    flex: 1;
    padding: 6px 4px;
    background: white;
    border: 2px solid var(--ink);
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .stats-tab.active { background: var(--ink); color: white; }
  .stats-tab:hover:not(.active) { background: var(--pink-soft); }
  .stats-chart {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 12px;
  }
  .stats-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stats-row .face {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    width: 28px;
    text-align: right;
    color: var(--ink);
  }
  .stats-row .bar-wrap {
    flex: 1;
    height: 18px;
    background: var(--yellow-soft);
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .stats-row .bar {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--pink-deep));
    transition: width 0.5s ease-out;
    border-radius: 999px 0 0 999px;
  }
  .stats-row .count {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    width: 40px;
    text-align: right;
    font-size: 11px;
    color: var(--ink);
  }

  .info-note {
    background: var(--yellow-soft);
    border: 2px solid var(--ink);
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
  }
  .info-note b { color: var(--pink-deep); font-weight: 700; }

  /* toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 12px 22px;
    font-size: 14px;
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 var(--pink-deep);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 1000;
    border-radius: 999px;
    font-weight: 500;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ink-soft); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>線上骰子</h1>
    <div class="sub">歪腦袋小工具 · v1.0</div>
  </div>
  <a class="donate-btn" href="https://fernfern.bobaboba.me" target="_blank" rel="noopener">
    <svg class="donate-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 7 L7.5 21 Q7.7 22.2 9 22.2 L15 22.2 Q16.3 22.2 16.5 21 L19 7 Z" fill="#F8E0BE" stroke="#3A2618" stroke-width="1.3" stroke-linejoin="round"/>
      <ellipse cx="12" cy="7" rx="7" ry="1.6" fill="#C48A60" stroke="#3A2618" stroke-width="1.3"/>
      <path d="M14 2 L13 8" stroke="#E85A5A" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="10" cy="17" r="1.3" fill="#3A2618"/>
      <circle cx="13" cy="18.5" r="1.3" fill="#3A2618"/>
      <circle cx="11" cy="14" r="1.2" fill="#3A2618"/>
      <circle cx="14" cy="15.5" r="1.2" fill="#3A2618"/>
    </svg>
    <div>歡迎餵食我 🤤</div>
  </a>
</header>

<main>
  <section class="workspace">

    <!-- 骰子選擇 -->
    <div class="dice-selector">
      <div class="dice-types">
        <button class="dice-type-btn" data-sides="4">
          <span class="name">D4</span>
          <span class="sub">四面</span>
        </button>
        <button class="dice-type-btn active" data-sides="6">
          <span class="name">D6</span>
          <span class="sub">六面</span>
        </button>
        <button class="dice-type-btn" data-sides="8">
          <span class="name">D8</span>
          <span class="sub">八面</span>
        </button>
        <button class="dice-type-btn" data-sides="10">
          <span class="name">D10</span>
          <span class="sub">十面</span>
        </button>
        <button class="dice-type-btn" data-sides="12">
          <span class="name">D12</span>
          <span class="sub">十二面</span>
        </button>
        <button class="dice-type-btn" data-sides="20">
          <span class="name">D20</span>
          <span class="sub">二十面</span>
        </button>
      </div>

      <div class="dice-count-row">
        <label>骰子數量</label>
        <button class="count-btn" id="btnMinus">−</button>
        <div class="count-display" id="diceCount">1</div>
        <button class="count-btn" id="btnPlus">+</button>

        <label style="margin-left:16px;">修正值</label>
        <input type="number" class="modifier-input" id="modifier" value="0" min="-99" max="99" step="1">

        <div class="dice-formula" id="formula">1d6</div>
      </div>
    </div>

    <!-- 主舞台 -->
    <div class="dice-stage">
      <div class="dice-area" id="diceArea">
        <!-- 骰子會動態插入 -->
      </div>

      <div class="result-summary hidden" id="resultSummary">
        <span class="result-label">出點</span>
        <span class="result-individual" id="resultIndividual">—</span>
        <span class="result-modifier" id="resultModifier" style="display:none;"></span>
        <span class="result-label">總和</span>
        <span class="result-total" id="resultTotal">—</span>
      </div>

      <button class="roll-btn" id="btnRoll">🎲 投擲</button>
    </div>

  </section>

  <aside class="sidebar">

    <div class="info-note">
      <b>使用方式：</b><br>
      1. 選擇骰種（D4~D20）<br>
      2. 設定骰子數量、修正值<br>
      3. 按 <b>「🎲 投擲」</b> 或<b>空白鍵</b><br><br>
      💡 修正值範例：<br>
      D20 攻擊 +5 → 設修正值 5<br>
      結果就會自動加上 5
    </div>

    <div class="section">
      <div class="section-title">
        投擲歷史
        <div style="display:flex;gap:4px;align-items:center;">
          <span class="badge" id="historyCount">0</span>
          <button class="btn sm danger" id="btnClearHistory" title="清空歷史">✕</button>
        </div>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-state">尚無投擲記錄</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">出點統計</div>
      <div class="stats-controls" id="statsTabs">
        <button class="stats-tab active" data-stats-die="6">D6</button>
        <button class="stats-tab" data-stats-die="4">D4</button>
        <button class="stats-tab" data-stats-die="8">D8</button>
        <button class="stats-tab" data-stats-die="10">D10</button>
        <button class="stats-tab" data-stats-die="12">D12</button>
        <button class="stats-tab" data-stats-die="20">D20</button>
      </div>
      <div class="stats-chart" id="statsChart">
        <div class="empty-state">尚無數據</div>
      </div>
    </div>

  </aside>
</main>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);

const state = {
  sides: 6,
  count: 1,
  modifier: 0,
  rolling: false,
  history: [],     // [{ time, sides, count, modifier, rolls, total }]
  statsDie: 6,
};

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 2000);
}

// ─── localStorage ───
const STORAGE_KEY = 'wonky-dice-history';
function loadHistory() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) state.history = JSON.parse(data);
  } catch (e) { state.history = []; }
}
function saveHistory() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.history.slice(0, 200)));
  } catch (e) {}
}

// ─── 骰種選擇 ───
document.querySelectorAll('.dice-type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.rolling) return;
    document.querySelectorAll('.dice-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.sides = parseInt(btn.dataset.sides);
    updateFormula();
    renderDice();
    resetResult();
  });
});

// ─── 骰子數量 ───
$('btnMinus').addEventListener('click', () => {
  if (state.rolling) return;
  if (state.count > 1) {
    state.count--;
    $('diceCount').textContent = state.count;
    updateFormula();
    renderDice();
    resetResult();
  }
});
$('btnPlus').addEventListener('click', () => {
  if (state.rolling) return;
  if (state.count < 10) {
    state.count++;
    $('diceCount').textContent = state.count;
    updateFormula();
    renderDice();
    resetResult();
  }
});

// ─── 修正值 ───
$('modifier').addEventListener('input', e => {
  if (state.rolling) return;
  state.modifier = parseInt(e.target.value) || 0;
  updateFormula();
});

function updateFormula() {
  const mod = state.modifier;
  let s = `${state.count}d${state.sides}`;
  if (mod > 0) s += `+${mod}`;
  else if (mod < 0) s += `${mod}`;
  $('formula').textContent = s;
}

// ─── 渲染骰子（顯示初始 1 點） ───
function renderDice() {
  const area = $('diceArea');
  area.innerHTML = '';
  for (let i = 0; i < state.count; i++) {
    const die = createDie(state.sides, 1);
    area.appendChild(die);
  }
}

function createDie(sides, value) {
  const wrap = document.createElement('div');
  wrap.style.position = 'relative';
  const die = document.createElement('div');
  die.className = `die d${sides}`;
  die.dataset.value = value;

  if (sides === 6) {
    // 立方體 6 面
    const faces = [1, 2, 3, 4, 5, 6];
    faces.forEach((n) => {
      const f = document.createElement('div');
      f.className = `die-face f${n}`;
      f.textContent = n;
      die.appendChild(f);
    });
    setD6Value(die, value);
  } else {
    // 其他面數：用單一可變面
    const f = document.createElement('div');
    f.className = 'die-face';
    f.textContent = value;
    die.appendChild(f);
  }

  // 陰影
  const shadow = document.createElement('div');
  shadow.className = 'die-shadow';

  wrap.appendChild(die);
  wrap.appendChild(shadow);
  return wrap;
}

// D6 旋轉到指定點數
function setD6Value(die, value) {
  const rotations = {
    1: 'rotateX(0deg) rotateY(0deg)',
    2: 'rotateY(-90deg)',
    3: 'rotateY(180deg)',
    4: 'rotateY(90deg)',
    5: 'rotateX(-90deg)',
    6: 'rotateX(90deg)',
  };
  die.style.transform = rotations[value] || rotations[1];
}

function resetResult() {
  $('resultSummary').classList.add('hidden');
  $('resultIndividual').textContent = '—';
  $('resultTotal').textContent = '—';
  $('resultModifier').style.display = 'none';
}

// ─── 投擲！ ───
async function rollDice() {
  if (state.rolling) return;
  state.rolling = true;
  $('btnRoll').disabled = true;
  resetResult();

  const area = $('diceArea');
  // 重新建立骰子（如果還沒有）
  if (area.children.length !== state.count) renderDice();

  // 啟動 rolling 動畫
  const dieElements = Array.from(area.querySelectorAll('.die'));
  dieElements.forEach(d => d.classList.add('rolling'));

  // 持續變化過程中顯示隨機數，500ms 後停止
  const ticker = setInterval(() => {
    dieElements.forEach(d => {
      const v = Math.floor(Math.random() * state.sides) + 1;
      updateDieFace(d, v);
    });
  }, 80);

  // 等待動畫
  await new Promise(r => setTimeout(r, 1100));

  clearInterval(ticker);

  // 計算最終結果
  const rolls = [];
  for (let i = 0; i < state.count; i++) {
    rolls.push(Math.floor(Math.random() * state.sides) + 1);
  }
  const total = rolls.reduce((a, b) => a + b, 0) + state.modifier;

  // 套用結果
  dieElements.forEach((d, i) => {
    d.classList.remove('rolling');
    updateDieFace(d, rolls[i]);
    // 若所有點數都是最大值，加 winner 樣式
    if (rolls[i] === state.sides) {
      d.querySelectorAll('.die-face').forEach(f => {
        // D6 只加 winner 在正確的那一面
        if (state.sides === 6) {
          if (f.textContent == rolls[i]) f.classList.add('winner');
        } else {
          f.classList.add('winner');
        }
      });
    }
  });

  // 顯示結果
  $('resultIndividual').textContent = rolls.join(' + ');
  if (state.modifier !== 0) {
    const sign = state.modifier > 0 ? '+' : '';
    $('resultModifier').innerHTML = `<b>${sign}${state.modifier}</b>`;
    $('resultModifier').style.display = 'inline';
  }
  $('resultTotal').textContent = total;
  $('resultSummary').classList.remove('hidden');

  // 寫入歷史
  const entry = {
    time: Date.now(),
    sides: state.sides,
    count: state.count,
    modifier: state.modifier,
    rolls,
    total,
  };
  state.history.unshift(entry);
  if (state.history.length > 200) state.history.pop();
  saveHistory();
  renderHistory();
  renderStats();

  // 等視覺停頓
  await new Promise(r => setTimeout(r, 200));
  state.rolling = false;
  $('btnRoll').disabled = false;
}

function updateDieFace(dieEl, value) {
  if (dieEl.classList.contains('d6')) {
    setD6Value(dieEl, value);
  } else {
    const face = dieEl.querySelector('.die-face');
    if (face) face.textContent = value;
  }
  dieEl.dataset.value = value;
}

$('btnRoll').addEventListener('click', rollDice);

// 空白鍵投擲
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && !state.rolling) {
    const tag = (e.target.tagName || '').toUpperCase();
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    e.preventDefault();
    rollDice();
  }
});

// ─── 歷史顯示 ───
function renderHistory() {
  const list = $('historyList');
  $('historyCount').textContent = state.history.length;
  if (!state.history.length) {
    list.innerHTML = '<div class="empty-state">尚無投擲記錄</div>';
    return;
  }
  // 只顯示最近 30 筆
  list.innerHTML = '';
  state.history.slice(0, 30).forEach(entry => {
    const mod = entry.modifier;
    let formula = `${entry.count}d${entry.sides}`;
    if (mod > 0) formula += `+${mod}`;
    else if (mod < 0) formula += `${mod}`;
    const t = new Date(entry.time);
    const timeStr = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
    const el = document.createElement('div');
    el.className = 'history-item';
    el.innerHTML = `
      <span class="formula">${formula}</span>
      <span class="result">${entry.rolls.join('+')}${mod ? ` ${mod>0?'+':''}${mod}` : ''}</span>
      <span class="total">${entry.total}</span>
      <span class="time">${timeStr}</span>
    `;
    list.appendChild(el);
  });
}

$('btnClearHistory').addEventListener('click', () => {
  if (!state.history.length) return;
  if ($('btnClearHistory').dataset.confirm === '1') {
    state.history = [];
    saveHistory();
    renderHistory();
    renderStats();
    $('btnClearHistory').dataset.confirm = '0';
    $('btnClearHistory').textContent = '✕';
    toast('已清空所有歷史');
    return;
  }
  $('btnClearHistory').dataset.confirm = '1';
  $('btnClearHistory').textContent = '⚠';
  toast('再按一次確認清空');
  setTimeout(() => {
    $('btnClearHistory').dataset.confirm = '0';
    $('btnClearHistory').textContent = '✕';
  }, 3000);
});

// ─── 統計 ───
document.querySelectorAll('.stats-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.stats-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.statsDie = parseInt(tab.dataset.statsDie);
    renderStats();
  });
});

function renderStats() {
  const chart = $('statsChart');
  const sides = state.statsDie;
  // 統計每個面出現次數
  const counts = new Array(sides).fill(0);
  let total = 0;
  state.history.forEach(entry => {
    if (entry.sides === sides) {
      entry.rolls.forEach(v => {
        counts[v - 1]++;
        total++;
      });
    }
  });

  if (total === 0) {
    chart.innerHTML = `<div class="empty-state">尚無 D${sides} 數據<br><span style="font-size:11px;color:var(--ink-soft);">投擲後會自動統計</span></div>`;
    return;
  }

  const maxCount = Math.max(...counts);
  chart.innerHTML = '';
  // 標題
  const header = document.createElement('div');
  header.style.cssText = 'font-family:DM Mono,monospace;font-size:11px;color:var(--ink-soft);margin-bottom:4px;display:flex;justify-content:space-between;';
  const avg = (state.history
    .filter(e => e.sides === sides)
    .flatMap(e => e.rolls)
    .reduce((a, b) => a + b, 0) / total).toFixed(2);
  header.innerHTML = `<span>D${sides} · 共 <b style="color:var(--ink);">${total}</b> 次</span><span>平均 <b style="color:var(--pink-deep);">${avg}</b></span>`;
  chart.appendChild(header);

  for (let i = 0; i < sides; i++) {
    const row = document.createElement('div');
    row.className = 'stats-row';
    const pct = maxCount > 0 ? (counts[i] / maxCount * 100) : 0;
    const pctOfTotal = total > 0 ? ((counts[i] / total) * 100).toFixed(1) : '0';
    row.innerHTML = `
      <span class="face">${i + 1}</span>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
      <span class="count">${counts[i]} (${pctOfTotal}%)</span>
    `;
    chart.appendChild(row);
  }
}

// ─── 初始化 ───
loadHistory();
renderDice();
updateFormula();
renderHistory();
renderStats();
</script>
</body>
</html>
