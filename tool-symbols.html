<style>
  :root {
    --bg: #FFF5FA; --ink: #4A3A5C; --ink-soft: #8B7BA0;
    --pink: #FF8FAF; --pink-soft: #FFC8DD; --pink-deep: #E8538A;
    --blue: #A8C8FF; --blue-soft: #D4E2FF; --blue-deep: #6B9DFF;
    --yellow: #FFE9A8; --yellow-soft: #FFF5D1;
    --green: #B8E5C8; --green-deep: #6BC48F;
    --purple: #D4C0FF; --purple-deep: #B294E0;
    --grid-line: rgba(232, 83, 138, 0.18); --line: rgba(74, 58, 92, 0.15);
    --shadow: 3px 3px 0 var(--ink); --shadow-sm: 2px 2px 0 var(--ink);

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: linear-gradient(135deg, #FFE4F0 0%, #FFD6EA 50%, #F5DCFF 100%); min-height: 100vh; position: relative; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255, 150, 195, 0.5) 0%, transparent 35%),
      radial-gradient(circle at 80% 15%, rgba(220, 200, 255, 0.45) 0%, transparent 40%),
      radial-gradient(circle at 50% 60%, rgba(255, 195, 220, 0.5) 0%, transparent 45%),
      radial-gradient(circle at 90% 75%, rgba(230, 200, 255, 0.45) 0%, transparent 35%),
      radial-gradient(circle at 10% 85%, rgba(255, 180, 210, 0.5) 0%, transparent 40%);
    pointer-events: none; z-index: 0; filter: blur(2px);
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 35px 35px; pointer-events: none; z-index: 1; mix-blend-mode: multiply;
  }
  header, main, .toast { position: relative; z-index: 2; }
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255, 228, 240, 0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--ink); padding: 16px 32px 14px;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900; font-size: 28px; letter-spacing: 0.04em; line-height: 1; color: var(--ink); transform: rotate(-2deg); position: relative; }
  .brand h1::after { content: '✦'; position: absolute; top: -8px; right: -16px; font-size: 14px; color: var(--pink); transform: rotate(2deg); }
  .brand .sub { font-family: 'Caveat', cursive; font-size: 18px; color: var(--pink-deep); font-weight: 600; transform: rotate(-1deg); }
  .donate-btn { display: flex; align-items: center; height: 40px; padding: 6px 14px; border-radius: 12px; color: #F8E0BE; background-color: #AD5138; border: 2px solid var(--ink); text-decoration: none; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 600; box-shadow: var(--shadow-sm); transition: all 0.2s; gap: 8px; white-space: nowrap; }
  .donate-btn:hover { transform: translate(-1px, -1px); box-shadow: var(--shadow); background-color: #C25E45; }
  .donate-icon { width: 26px; height: 26px; flex-shrink: 0; display: block; }

  main { max-width: 920px; margin: 0 auto; padding: 28px 24px 60px; display: flex; flex-direction: column; gap: 18px; }

  /* 搜尋列 */
  .search-bar { display: flex; gap: 10px; align-items: center; }
  .search-input {
    flex: 1; padding: 12px 18px; border: 2px solid var(--ink); border-radius: 999px;
    background: white; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; color: var(--ink);
    box-shadow: var(--shadow-sm);
  }
  .search-input:focus { outline: none; box-shadow: var(--shadow); }

  /* 分類分頁 */
  .cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-tab {
    padding: 7px 14px; background: white; border: 2px solid var(--ink); border-radius: 999px; cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700; color: var(--ink); transition: all 0.15s; box-shadow: var(--shadow-sm);
  }
  .cat-tab:hover:not(.active) { background: var(--pink-soft); transform: translate(-1px,-1px); }
  .cat-tab.active { background: var(--ink); color: white; }

  /* 符號區塊 */
  .symbol-group { display: flex; flex-direction: column; gap: 10px; }
  .group-title { font-family: 'Kaisei Decol', serif; font-size: 16px; font-weight: 700; color: var(--ink); padding-bottom: 4px; border-bottom: 2px solid var(--ink); }
  .symbol-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 8px; }
  .symbol-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    background: white; border: 2px solid var(--ink); border-radius: 12px; cursor: pointer;
    font-size: 26px; transition: all 0.12s; box-shadow: var(--shadow-sm); user-select: none;
  }
  .symbol-cell:hover { background: var(--yellow); transform: translate(-2px, -2px); box-shadow: var(--shadow); }
  .symbol-cell:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
  .symbol-cell.text-sym { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 700; }
  .symbol-cell.kaomoji { font-size: 13px; font-family: 'DM Mono', monospace; padding: 4px; text-align: center; line-height: 1.2; word-break: break-all; }

  .empty { text-align: center; color: var(--ink-soft); font-style: italic; padding: 40px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: white; padding: 12px 22px; font-size: 14px; border: 2px solid var(--ink); box-shadow: 4px 4px 0 var(--pink-deep); opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 1000; border-radius: 999px; font-weight: 500; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

const state = { category: 'all', search: '' };

function renderCatTabs() {
  const container = $('catTabs');
  container.innerHTML = '';
  const allTab = document.createElement('div');
  allTab.className = 'cat-tab' + (state.category === 'all' ? ' active' : '');
  allTab.textContent = '全部';
  allTab.addEventListener('click', () => { state.category = 'all'; renderCatTabs(); render(); });
  container.appendChild(allTab);
  Object.keys(symbolData).forEach(cat => {
    const tab = document.createElement('div');
    tab.className = 'cat-tab' + (state.category === cat ? ' active' : '');
    tab.textContent = cat;
    tab.addEventListener('click', () => { state.category = cat; renderCatTabs(); render(); });
    container.appendChild(tab);
  });
}

function copySymbol(sym) {
  navigator.clipboard.writeText(sym).then(() => toast('✓ 已複製 ' + sym)).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = sym; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('✓ 已複製 ' + sym);
  });
}

function makeCell(sym, type) {
  const cell = document.createElement('div');
  cell.className = 'symbol-cell' + (type === 'text' ? ' text-sym' : type === 'kaomoji' ? ' kaomoji' : '');
  cell.textContent = sym;
  cell.title = '點擊複製';
  cell.addEventListener('click', () => copySymbol(sym));
  return cell;
}

function render() {
  const container = $('symbolContainer');
  container.innerHTML = '';
  const search = state.search.trim().toLowerCase();

  const catsToShow = state.category === 'all' ? Object.keys(symbolData) : [state.category];
  let totalShown = 0;

  catsToShow.forEach(cat => {
    const data = symbolData[cat];
    let items = data.items;
    if (search) {
      items = items.filter(([sym, kw]) => kw.toLowerCase().includes(search) || sym.includes(search) || cat.includes(search));
    }
    if (items.length === 0) return;
    totalShown += items.length;

    const group = document.createElement('div');
    group.className = 'symbol-group';
    const title = document.createElement('div');
    title.className = 'group-title';
    title.textContent = cat;
    group.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'symbol-grid';
    if (data.type === 'kaomoji') grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(110px, 1fr))';
    items.forEach(([sym]) => grid.appendChild(makeCell(sym, data.type)));
    group.appendChild(grid);
    container.appendChild(group);
  });

  if (totalShown === 0) {
    container.innerHTML = '<div class="empty">找不到符合的符號，換個關鍵字試試</div>';
  }
}

$('searchInput').addEventListener('input', e => { state.search = e.target.value; render(); });

renderCatTabs();
render();
</script>
