<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code 產生器・網址文字轉條碼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kaisei+Decol:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #FFF5FA; --ink: #4A3A5C; --ink-soft: #8B7BA0;
    --pink: #FF8FAF; --pink-soft: #FFC8DD; --pink-deep: #E8538A;
    --blue: #A8C8FF; --blue-soft: #D4E2FF; --blue-deep: #6B9DFF;
    --yellow: #FFE9A8; --yellow-soft: #FFF5D1;
    --green: #B8E5C8; --green-deep: #6BC48F;
    --purple: #D4C0FF; --purple-deep: #B294E0;
    --grid-line: rgba(232, 83, 138, 0.18); --line: rgba(74, 58, 92, 0.15);
    --shadow: 3px 3px 0 var(--ink); --shadow-sm: 2px 2px 0 var(--ink);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { color: var(--ink); font-family: 'Noto Sans TC', sans-serif; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  body { background: linear-gradient(135deg, #FFE4F0 0%, #FFD6EA 50%, #F5DCFF 100%); min-height: 100vh; position: relative; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 15% 20%, rgba(255, 150, 195, 0.5) 0%, transparent 35%), radial-gradient(circle at 80% 15%, rgba(220, 200, 255, 0.45) 0%, transparent 40%), radial-gradient(circle at 50% 60%, rgba(255, 195, 220, 0.5) 0%, transparent 45%), radial-gradient(circle at 90% 75%, rgba(230, 200, 255, 0.45) 0%, transparent 35%), radial-gradient(circle at 10% 85%, rgba(255, 180, 210, 0.5) 0%, transparent 40%); pointer-events: none; z-index: 0; filter: blur(2px); }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px); background-size: 35px 35px; pointer-events: none; z-index: 1; mix-blend-mode: multiply; }
  header, main, .toast { position: relative; z-index: 2; }
  header { position: sticky; top: 0; z-index: 100; background: rgba(255, 228, 240, 0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 2px solid var(--ink); padding: 16px 32px 14px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900; font-size: 28px; letter-spacing: 0.04em; line-height: 1; color: var(--ink); transform: rotate(-2deg); position: relative; }
  .brand h1::after { content: '📱'; position: absolute; top: -10px; right: -24px; font-size: 15px; transform: rotate(15deg); }
  .brand .sub { font-family: 'Caveat', cursive; font-size: 18px; color: var(--pink-deep); font-weight: 600; transform: rotate(-1deg); }
  .donate-btn { display: flex; align-items: center; height: 40px; padding: 6px 14px; border-radius: 12px; color: #F8E0BE; background-color: #AD5138; border: 2px solid var(--ink); text-decoration: none; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 600; box-shadow: var(--shadow-sm); transition: all 0.2s; gap: 8px; white-space: nowrap; }
  .donate-btn:hover { transform: translate(-1px, -1px); box-shadow: var(--shadow); background-color: #C25E45; }
  .donate-icon { width: 26px; height: 26px; flex-shrink: 0; display: block; }

  main { max-width: 820px; margin: 0 auto; padding: 32px 24px 60px; display: grid; grid-template-columns: 1fr 320px; gap: 22px; }
  @media (max-width: 760px) { main { grid-template-columns: 1fr; } }

  .input-card { background: white; border: 2px solid var(--ink); border-radius: 18px; padding: 22px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 16px; }
  .section-label { font-family: 'Kaisei Decol', serif; font-size: 16px; font-weight: 700; color: var(--ink); }
  .text-area { width: 100%; min-height: 100px; padding: 14px; border: 2px solid var(--ink); border-radius: 14px; background: var(--yellow-soft); font-family: 'Noto Sans TC', sans-serif; font-size: 15px; line-height: 1.6; resize: vertical; color: var(--ink); }
  .text-area:focus { outline: none; background: white; box-shadow: var(--shadow-sm); }
  .text-area::placeholder { color: var(--ink-soft); opacity: 0.6; }

  .opt-row { display: flex; flex-direction: column; gap: 8px; }
  .opt-header { display: flex; justify-content: space-between; align-items: center; }
  .opt-header label { font-size: 14px; font-weight: 700; color: var(--ink); }
  .opt-val { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 700; color: var(--pink-deep); }
  input[type=range] { width: 100%; height: 8px; -webkit-appearance: none; appearance: none; background: var(--yellow-soft); border: 2px solid var(--ink); border-radius: 999px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; background: var(--pink-deep); border: 2px solid var(--ink); border-radius: 50%; cursor: pointer; }
  input[type=range]::-moz-range-thumb { width: 22px; height: 22px; background: var(--pink-deep); border: 2px solid var(--ink); border-radius: 50%; cursor: pointer; }

  .color-opts { display: flex; gap: 16px; flex-wrap: wrap; }
  .color-opt { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .color-opt label { color: var(--ink-soft); }
  .color-opt input[type=color] { width: 40px; height: 34px; border: 2px solid var(--ink); border-radius: 8px; cursor: pointer; padding: 2px; background: white; }

  .ec-tabs { display: flex; gap: 6px; }
  .ec-tab { flex: 1; padding: 8px 4px; text-align: center; background: white; border: 2px solid var(--ink); border-radius: 999px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; color: var(--ink); transition: all 0.15s; }
  .ec-tab.active { background: var(--ink); color: white; }
  .ec-tab:hover:not(.active) { background: var(--pink-soft); }

  .preview-card { background: white; border: 2px solid var(--ink); border-radius: 18px; padding: 22px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 16px; align-items: center; height: fit-content; }
  .qr-box { width: 100%; aspect-ratio: 1; border: 2px dashed var(--ink); border-radius: 14px; display: flex; align-items: center; justify-content: center; background: var(--yellow-soft); overflow: hidden; padding: 12px; }
  .qr-box canvas, .qr-box img { max-width: 100%; height: auto; border-radius: 6px; }
  .qr-box .placeholder { color: var(--ink-soft); font-size: 13px; text-align: center; font-style: italic; }
  .download-row { display: flex; gap: 8px; width: 100%; }

  .btn { font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 14px; padding: 11px 16px; background: white; border: 2px solid var(--ink); color: var(--ink); cursor: pointer; transition: all 0.2s; border-radius: 999px; box-shadow: var(--shadow-sm); white-space: nowrap; flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  .btn:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: var(--shadow); background: var(--pink-soft); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--pink-deep); color: white; }
  .btn.primary:hover:not(:disabled) { background: var(--pink); }

  .quick-fill { display: flex; gap: 6px; flex-wrap: wrap; }
  .quick-btn { padding: 6px 12px; background: var(--blue-soft); border: 2px solid var(--ink); border-radius: 999px; cursor: pointer; font-size: 12px; font-weight: 700; color: var(--ink); transition: all 0.15s; }
  .quick-btn:hover { background: var(--blue); transform: translate(-1px,-1px); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: white; padding: 12px 22px; font-size: 14px; border: 2px solid var(--ink); box-shadow: 4px 4px 0 var(--pink-deep); opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 1000; border-radius: 999px; font-weight: 500; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { box-shadow: 4px 4px 0 var(--pink); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>QR Code 產生器</h1>
    <div class="sub">歪腦袋小工具 · v1.1</div>
  </div>
  <a class="donate-btn" href="https://fernfern.bobaboba.me" target="_blank" rel="noopener">
    <svg class="donate-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 7 L7.5 21 Q7.7 22.2 9 22.2 L15 22.2 Q16.3 22.2 16.5 21 L19 7 Z" fill="#F8E0BE" stroke="#3A2618" stroke-width="1.3" stroke-linejoin="round"/>
      <ellipse cx="12" cy="7" rx="7" ry="1.6" fill="#C48A60" stroke="#3A2618" stroke-width="1.3"/>
      <path d="M14 2 L13 8" stroke="#E85A5A" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="10" cy="17" r="1.3" fill="#3A2618"/><circle cx="13" cy="18.5" r="1.3" fill="#3A2618"/><circle cx="11" cy="14" r="1.2" fill="#3A2618"/><circle cx="14" cy="15.5" r="1.2" fill="#3A2618"/>
    </svg>
    <div>歡迎餵食我 🤤</div>
  </a>
</header>

<main>
  <div class="input-card">
    <div class="section-label">輸入內容</div>
    <textarea class="text-area" id="contentInput" placeholder="貼上網址、文字、或任何內容...&#10;&#10;💡 例如：&#10;https://wonky-brain.vercel.app&#10;或 LINE 連結、IG 連結、聯絡資訊"></textarea>

    <div class="quick-fill">
      <span style="font-size:12px;color:var(--ink-soft);align-self:center;">快速填入：</span>
      <button class="quick-btn" data-fill="https://">https://</button>
      <button class="quick-btn" data-fill="https://wonky-brain.vercel.app">我的網站</button>
      <button class="quick-btn" data-fill="mailto:">Email</button>
      <button class="quick-btn" data-fill="tel:">電話</button>
    </div>

    <div class="opt-row">
      <div class="opt-header">
        <label>尺寸</label>
        <span class="opt-val" id="sizeVal">512 px</span>
      </div>
      <input type="range" id="sizeSlider" min="128" max="1024" value="512" step="64">
    </div>

    <div class="opt-row">
      <label>容錯等級（越高越能容忍破損 / 加 logo）</label>
      <div class="ec-tabs" id="ecTabs">
        <div class="ec-tab" data-ec="L">低 L</div>
        <div class="ec-tab active" data-ec="M">中 M</div>
        <div class="ec-tab" data-ec="Q">較高 Q</div>
        <div class="ec-tab" data-ec="H">高 H</div>
      </div>
    </div>

    <div class="color-opts">
      <div class="color-opt">
        <label>前景色</label>
        <input type="color" id="fgColor" value="#4A3A5C">
      </div>
      <div class="color-opt">
        <label>背景色</label>
        <input type="color" id="bgColor" value="#FFFFFF">
      </div>
    </div>
  </div>

  <div class="preview-card">
    <div class="section-label">預覽</div>
    <div class="qr-box" id="qrBox">
      <div class="placeholder">輸入內容後<br>自動產生 QR Code</div>
    </div>
    <div class="download-row">
      <button class="btn primary" id="btnDownloadPng" disabled>⬇ PNG</button>
      <button class="btn" id="btnCopyImg" disabled>📋 複製</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
function toast(msg, err) { const t = $('toast'); t.textContent = msg; t.className = 'toast show' + (err ? ' err' : ''); clearTimeout(t._t); t._t = setTimeout(() => t.className = 'toast', 2000); }

const state = { content: '', size: 512, ec: 'M', fg: '#4A3A5C', bg: '#FFFFFF', canvas: null, qrImg: null };

function generate() {
  const content = $('contentInput').value.trim();
  const box = $('qrBox');
  if (!content) {
    box.innerHTML = '<div class="placeholder">輸入內容後<br>自動產生 QR Code</div>';
    $('btnDownloadPng').disabled = true;
    $('btnCopyImg').disabled = true;
    state.canvas = null;
    return;
  }
  if (typeof QRCode === 'undefined') {
    toast('QR 函式庫載入中，請稍候再試', true);
    return;
  }

  // qrcodejs 的錯誤更正等級對應
  const ecMap = {
    L: QRCode.CorrectLevel.L,
    M: QRCode.CorrectLevel.M,
    Q: QRCode.CorrectLevel.Q,
    H: QRCode.CorrectLevel.H,
  };

  // qrcodejs 直接在容器內畫，先清空容器用一個臨時 div
  box.innerHTML = '';
  const holder = document.createElement('div');
  box.appendChild(holder);

  try {
    new QRCode(holder, {
      text: content,
      width: state.size,
      height: state.size,
      colorDark: state.fg,
      colorLight: state.bg,
      correctLevel: ecMap[state.ec] || QRCode.CorrectLevel.M,
    });
  } catch (err) {
    console.error(err);
    toast('產生失敗：內容可能太長', true);
    return;
  }

  // qrcodejs 會產生一個 canvas（和一個備用 img），抓 canvas 出來
  // 用 setTimeout 確保 DOM 已繪製
  setTimeout(() => {
    const canvas = holder.querySelector('canvas');
    if (canvas) {
      state.canvas = canvas;
      $('btnDownloadPng').disabled = false;
      $('btnCopyImg').disabled = false;
    } else {
      // 退而求其次抓 img
      const img = holder.querySelector('img');
      if (img) {
        state.canvas = null;
        state.qrImg = img;
        $('btnDownloadPng').disabled = false;
        $('btnCopyImg').disabled = false;
      }
    }
  }, 50);
}

$('contentInput').addEventListener('input', e => { state.content = e.target.value; generate(); });
$('sizeSlider').addEventListener('input', e => { state.size = parseInt(e.target.value); $('sizeVal').textContent = state.size + ' px'; generate(); });
document.querySelectorAll('.ec-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.ec-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.ec = tab.dataset.ec;
    generate();
  });
});
$('fgColor').addEventListener('input', e => { state.fg = e.target.value; generate(); });
$('bgColor').addEventListener('input', e => { state.bg = e.target.value; generate(); });

document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const fill = btn.dataset.fill;
    const cur = $('contentInput').value;
    // 如果是補 prefix 類（https:// 等），且目前空的就直接填
    if (!cur || cur === 'https://' || cur === 'mailto:' || cur === 'tel:') {
      $('contentInput').value = fill;
    } else {
      $('contentInput').value = fill;
    }
    state.content = $('contentInput').value;
    $('contentInput').focus();
    generate();
  });
});

$('btnDownloadPng').addEventListener('click', () => {
  let dataUrl;
  if (state.canvas) {
    dataUrl = state.canvas.toDataURL('image/png');
  } else if (state.qrImg) {
    dataUrl = state.qrImg.src;
  } else return;
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = 'qrcode.png';
  a.click();
  toast('已下載 PNG');
});

$('btnCopyImg').addEventListener('click', async () => {
  if (!state.canvas) { toast('此格式無法複製，請用下載', true); return; }
  try {
    state.canvas.toBlob(async blob => {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      toast('✓ 已複製圖片');
    });
  } catch (e) {
    toast('此瀏覽器不支援複製圖片，請用下載', true);
  }
});

// 函式庫就緒檢查：載入完成後若已有內容就自動產生
function waitForQRCode() {
  if (typeof QRCode !== 'undefined') {
    if ($('contentInput').value.trim()) generate();
    return;
  }
  let tries = 0;
  const timer = setInterval(() => {
    tries++;
    if (typeof QRCode !== 'undefined') {
      clearInterval(timer);
      if ($('contentInput').value.trim()) generate();
    } else if (tries > 50) {
      clearInterval(timer);
    }
  }, 100);
}
waitForQRCode();
</script>
</body>
</html>
